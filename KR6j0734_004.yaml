body:
  text: 沙門一行述記入漫荼羅具緣真言品第二之二至第五日暮復當次第具諸法則好自嚴身觀八漫荼羅位奉請結護等一一周備竟當誦不動明王或降三世尊與密印相應滿一百八遍加持此地阿闍棃言從第三日以去每日三時念誦每時皆誦不動真言一百八遍用加持地非獨此一夜也又從初日至三日以來若有留難即當收攝停止若已塗白檀位竟設有種種魔事兩不和合要當勤加方便必使得成餘如瞿醯中說其第五夜誦不動真言竟次當以大日如來身誦持地真言及作三昧印誦此真言曰南麼三曼多勃駄喃一薩婆怛佗蘖多引二地瑟𡛥二合那引地瑟祉二合帝三阿者麗四尾麼麗五􅋌娑麼二合羅嬭平六鉢囉二合吃㗚二合底鉢𭌆戍上睇七莎訶初句歸命一切諸佛第二第三句義云以一切如來加持而加持之此意云如彼金剛道場一切如來神力共所加持今令此地亦復如是也復次我已平治弟子淨心地竟此是心王如來圖畫大悲藏漫荼羅處我今說誠實言以一切如來神力而加護之使得堅固不動也第四句云阿者麗是不動義第五句云微麼麗是無垢義此意言以一切如來神力加持之令得安固不動非但不動而已又令離一切垢也正以第四句初阿字為真言體如來以何法加持能令畢竟不傾動耶謂即以此阿字門故有如是力用也第六句是憶念持義猶如比丘作羯磨法令眾僧一心和合同共受持今此真言亦爾用阿字加持竟請一切如來憶念本誓故同共受持也第七句是本性淨義此即轉釋前句何故諸佛同心念持由本性淨故若法入阿字門即是從本以來無動無垢十方三世諸佛由此義故皆同一戒一見所以同共加持也末句云莎訶者如僧羯磨竟更加忍可印成句若我所發誠言必定無謬唯願諸佛不越三昧耶故令所作圓滿也此中所有字義亦當廣分別說時彼阿闍棃當往東方一切如來壇位之外東向誦持真言或三遍或七遍能多益善次往南方次往西方次往北方皆背白檀座位而誦持之如是一周竟次往虗空眼位面向東北亦背壇位誦之次往東南次往西南次往西北又一周竟更當至誠作禮種種供養就阿闍棃座位面東而坐誦本受持真言住於本尊三昧皆如供養次第中說若又更次第持白檀位諸尊真言并結彼印阿闍棃言先持部主大日真言一百八遍所餘八位觀彼真言大小持之若更能誦者兼持第二院四菩薩第三院釋迦等上首諸尊乃至都誦諸位亦得也其白檀位但塗泥乾香水灑竟即得作之亦不尅在第四日自置了後皆須依此持誦至法事夜亦準此可知也其受持地夜阿闍棃如法持誦竟乃至以金剛諷詠遍歎諸佛菩薩宴坐疲極即於此置壇處如法護身東面而臥當於所度弟子極生大悲憐愍之心若瞿醯壇坦囉受持地竟又有結蘇多羅受持弟子名號法也彼安寢時當思惟心蓮華臺中麼字門一切諸法我不可得故即是無障礙菩提心也亦是如意寶珠又云此如意珠只是阿字門耳彼阿闍棃當於夢中或見無量諸佛及菩薩大名稱者示現作諸事業謂隨種種應度眾生三輪化導或親自安布建立悲生漫荼羅或以微妙音聲安慰勸囑言汝今愍念眾生故造作此漫荼羅善哉摩訶薩埵汝之所畫甚為微妙如是種種境界阿闍棃當以慧心善決擇之當知眾聖已共加持是地可隨意作法也若有障礙者應作相應護摩方便淨除當發大勤勇心要令所作成就復次若見諦阿闍棃則於蓮華三昧淨菩提心如意珠中自然明見有障無障因緣了了無礙心佛現前囑授為決所疑如其覺知魔事當以大智慧大方便旋轉作護摩法要令所持心不動不退堪建立法界漫荼羅然後休息也復次阿闍棃自初驚發地神以來便不應捨離如是道場之地恒於是中加持念誦宷諦觀察隨有未平正處輙脩治之又思惟眾緣支分皆令素具勿得臨事闕乏而生疑惑也自受持地竟即應規畫界域布定方位至灌頂夜方造諸尊若不能速成者持地以後漸次修之亦無咎也經云復次於餘日攝受應度人以下迄授與香水令飲彼心清淨故明攝受建立護持弟子支分受持地之明夜當作弟子法故云餘日也因此廣辨弟子應度之相偈云若弟子信心者謂阿闍梨觀彼現在根性或久遠因緣於此不思議緣起三種祕密諸方便中直信不疑無有能怖畏乃堪攝受餘如師德中說偈云生種姓清淨者謂於婆羅門等四種大姓家生若是旋陀羅等以家法相承習行不清淨事故性多弊惡若為作傳法灌頂使流通大法則生佗輕慢或成匱法因緣猶如比丘受具亦簡去毀辱眾僧極卑下姓也若但結緣受法則非所論復次若久遠以來曾有發菩提心因緣即是如來種姓中生最為勝族也偈云恭敬於三寶者謂於佛法眾僧起淳厚謙下之心常好親近供養尊重讚歎當知是人有先世行道因緣乃至如常不輕菩薩是名深敬一切眾生信佛法僧寶也深慧以嚴身者如是等虗空無邊佛法非劣慧者心器所堪故知智性深利以自莊嚴者乃可為說也堪忍無懈倦者此是有所堪能無所屈退之義梵音與忍辱不同謂求法因緣雖種種艱苦之事皆悉能作假令一度不成復更發進修之如誓抒大海盡而後已若人志性如是則可傳法也尸羅淨無缺者謂於在家出家律儀乃至於本姓受諸禁戒隨所奉持則深心防護無有毀缺若具如是性者雖未入三昧耶平等大誓亦當敬順不違故堪傳法也忍辱不慳恡者此中分為二句忍辱謂於內外違順境界八種大風其心安忍無所傾動如智度尸羅波羅蜜中廣說當知是人必不犯持明重禁作不利眾生行故堪為傳法也不慳恡者謂於所有財法常念惠佗設來求者心無鄙恡如智度檀波羅蜜中廣說當知是人必不犯持明重禁慳恡正法故堪傳授也勇健堅行願者亦分為二句勇健即是阿闍棃德中勇健菩提心種性於行道時雖遇種種可畏色聲心不怯弱乃至出生入死無怖畏想正順菩提薩埵大人所行故應傳授也堅行願者此是要心之願梵音與求願之義意不同如自立志令每日三時念誦則終竟一期雖過種種異緣初不間絕如是事有始終若行菩薩道時亦不虧本誓故堪傳法也然所說弟子十德若兼備者當知是人甚為希有假使偏有所長堪可匠成者即應攝授耳又如聲聞受具時觀察種種遮難所謂太少太老色貌瑕玼諸病患等恐白衣嫌訶故輙簡去之今此摩訶衍則不如是但令道機可濟雖有諸餘過失皆無所觀也偈中云或十或八七或五二一四者是一期道場作阿闍棃灌頂之限數此中約超數取之謂從一至二從二超至四從四至五從五超至七從七至八從八超至十人是故一漫荼羅中不得同時為三人六人九人灌頂葢如來密意阿闍棃不釋所由又同大方等陀羅尼經不得過十人已上也過此以外恐阿闍棃心量有所不周當待後緣別為作法又此十人以下者謂俱時發心各捨內外所有供養三寶同共成辦漫荼羅故得同時作法若人因遇道場便云法緣難值乞兼為濟度者未合為作阿闍棃灌頂也若但求結緣於一門本尊法中受真言印者則不依如是劑限阿闍棃亦當發起大悲隨有能起少分善心者皆為發生立菩提種子故云或復數過此也經云爾時金剛手祕密主復白佛言世尊當云何名此漫荼羅漫荼羅者其義云何此因如來簡人限眾為曉諸未悟者轉生疑問也金剛手本請世尊稱此加持境界演說大悲藏生大漫荼羅王則是平等大悲無復限量而今世尊所說雖有德可傳者猶不過十人似是隨轉一門非其具體故問當何名此漫荼羅也又漫荼羅是輪圓之義今既限局名數似於理未圓故復問此中漫荼羅者為是何義凡有二問世尊答中初答名次答義就答名中還復申明本旨云夫漫荼羅者是發生義今即名為發生諸佛漫荼羅也下菩提心種子於是一切智心地中潤以大悲水照以大慧日皷以大方便風不礙以大空空能令不思議法性芽次第滋長乃至彌滿法界成佛樹王故故以發生為稱夫雷雨作解隨甲坼者先萌不可以卉木滋榮性分不等遂令平分之施亦成限量也次答義中梵音漫荼羅是攢搖乳酪成蘇之義漫荼羅是蘇中極精醇者浮聚在上之義猶彼精醇不復變易復名為堅淨妙之味共相和合餘物所不能雜故有聚集義是故佛言極無比味無過上味是故說為漫荼羅也以三種祕密方便攢搖眾生佛性之乳乃至經歷五味成妙覺醍醐醇淨融妙不可復增一切金剛智印同共集會於真常不變甘露味中最為第一是為漫荼羅義也經云又祕密主以下廣演漫荼羅義釋除疑妨復分為三初明法界圓壇普門無限次明限人簡眾所由末句勸囑阿闍棃令興平等悲願就初文中哀愍無邊眾生界是大悲藏生漫荼羅廣義者若行人自見中胎藏時即知一切眾生悉有成佛因緣故其所起大悲漫荼羅亦周法界且如十世界微塵數諸執金剛菩薩眾等隨以一門作漫荼羅主餘為眷屬則成一種漫荼羅如是旋轉無窮已非筭數譬喻之所能及何況是中各以無量門莊嚴種種方便引攝眾生又可勝紀乎若行者於此一字法門中攝廣為略衍略為廣出生法財遍施一切常無斷盡乃名善解漫荼羅廣義也次云祕密主如來於無量劫積集阿耨多羅三藐三菩提之所加持是故具無量德當如是知者此釋廣義所由也如華嚴入法界諸善知識各各於一門中所通達法深廣無際然亦互不相知如來昔行菩薩道時普門親近如是等佛剎微塵數諸善知識於彼一一功德藏皆到極無等比無過上味以如是內證之德無量無邊故其所加持現作法門眷屬亦復無量無邊彼真言門行者當通泰其心作如是解也已知內德無限次明本地漫荼羅度人無限何以故以副本悲願故故經文次云祕密主非為一眾生故如來成等正覺亦非二非三為憐愍無餘記及有餘記諸眾生界故如來成等正覺以大悲願力於無量眾生界如其本性而演說法此中發菩提心義如入法界品及智度摩訶薩論議中廣說也無餘記者如佛現前授決某甲眾生於某劫中作佛號某如來有如是國土眷屬等以了了說故名無餘記也有餘記者如告眾生言汝於未來某佛時當畢是罪某甲如來為汝授記之類是也復次如世尊說若我在世或滅度後諸有聞法華經一句一偈我皆為授無上菩提記是名無餘記若言一切眾生悉有佛性彼生善根相續不斷當至無上菩提是名有餘記也我本為此等眾生來成正覺況今所願已滿開眾生自心之寶如其本性而給與之當有何限耶且據惡世弘經淺行之一迹故云一期法事劑至十人耳從此以下第二句即釋此限人簡眾所由經云祕密三無大乘宿習未曾思惟真言乘行彼不能少分見聞歡喜信受又金剛薩埵若彼有情昔於大乘真言乘道無量門進趣已曾修行為彼等故限此造立名數者此意云若諸眾生未曾於過去無量佛所久種善根於此祕密乘已曾修習則造次聞之不能信受若傳法人徒以善心差機為說或當增其誹謗斷彼善根故法華云無智疑悔則為永失也十方世界諸眾生少有志求聲聞者求緣覺者轉復少求大乘者甚希有求大乘者猶為易得信此法者最為難故以普眼觀之堪受是法者猶須彌大海之塵渧耳既將護彼意時乃說之安得不略制造立名數乎所云無量門進趣者即是兼釋漫荼羅名義夫漫荼羅者名為聚集今以如來真實功德集在一處乃至十方世界微塵數差別智印輪圓輻湊翼補大日心王使一切眾生普門進趣是故說為漫荼羅也所云略此造立名數者如以阿字五輪統如來無邊內德以字輪百明攝如來普眼法門此則名之略也以剎塵方便開八葉之壇以無極大悲制十人之限此則數之略也然志學者隨於一法明門而得悟入即是普入一切諸總持門如從一門見王即是遍入千門萬戶若不能如說而行則雖以種種文辭廣為開示無所益也故第三句次明限略名數自不礙於廣是以經云彼阿闍棃亦當以大悲心立如是誓願為度無餘眾生界故應當攝受無量眾生作菩提種子因緣謂造立此漫荼羅是隨有見聞觸知下至舉手低頭一念隨喜皆必定成於阿耨多羅三藐三菩提故阿闍棃雖不得差機誤授為作具支灌頂然繫珠毒皷之緣豈當已乎故當運大悲心務令廣洽也復次如人家有祕寶恐為盜賊所闚故掩以弊衣今此漫荼羅法門亦復如是以祕密之藏不可直宣說故迴轉密意覆以有相方便今言限以十人者乃是世諦漫荼羅耳然阿闍棃自當平治心地畫作大悲漫荼羅普限度人多多益善勿得如言而解也偈云持真言行者明弟子支分中護持建立方便至第六夜師及弟子皆澡浴清淨著新潔衣賷持供養物詣如前所造白檀漫荼羅處當如法加持自身道場及諸弟子其護弟子方便如下文入灌頂時所說阿闍棃如次第法則具修供養觀白檀位諸尊與密印相應持彼真言瞿醯經云手按中胎漫荼羅誦真言一遍如是一誦一按乃至七遍餘位亦爾也次當為諸弟子隨順說法開導其心教彼三歸依懺悔先罪既懺悔已身心清淨猶如明珠堪能真正發心是故次令發菩提心皆如供養法中所說次當授與塗香華等教令運心供養諸尊然後為受三世無障礙智戒此受菩薩戒法別有行儀也菩薩所以發心攝受方便學處皆為成就如來清淨智慧於一念中了達三世諸法無罣礙故其有住斯戒者乃至初見心明道時即有如是不思議勢分以此戒親能發生佛慧又對二乘律儀有限量故以三世無障礙智為名也次當授與齒木令諸弟子嚼之因即觀彼人成器及非器相所以為此法者亦是順彼方俗諦因用祕密方便而作加持也印度國人凡請僧食乃至世人相命皆先遣其齒木以種種香華嚴飾而授與之當知明日請彼飲食也所以如是者為明愛敬之心恐彼先有痰𤸌宿食因緣若受我供或令發動不安故先以善意將護而警發之令彼先淨身器或服訶棃勒等則明日隨意飲啖無所觸犯身心安樂也今阿闍棃亦爾授弟子楊枝時即當寄此方便為說深法我方當授汝佛性醍醐極無過上味已教汝發菩提心淨除三業宿障以三世無礙智調伏之牙噬諸煩惱竟今復以此祕密加持滌除身心過患汝又當淨其口過在所遊方勿妄宣傳明日當貽汝不死甘露皆令充足也彼當取優曇鉢羅或阿說佗木端直嫞好者不麤不細劑十二指量凡一切量法皆用大母指上節側而相捻是其正數也此二木是過去佛菩提樹若無者當求有乳之木謂桑穀等記木上下之別皆以枝末為上根柢為下以香水灌洗又復塗香而熏之於其下末以白線纏華用為莊嚴亦作標誌令上下易知故當以手按誦不動真言加之或百遍或千遍素令嚴備既受戒已師當取一齒木奉獻諸尊餘者分授弟子令出壇外向東或向北如法蹲踞嚼之嚼已令向所面之方而正擲之而驗其相若嚼處向外者是人悉地不成向身者悉地成就若遠擲却來近身是不久成就之相若首直豎向上成就更速首向下者是人當入修羅龍宮若擲在空中當知此人先已成就也又向北方東方為上成就西方為中成就南方為下成就雖如是若人先向東擲而嚼處向東即是背身亦不得成就餘方準此可知餘如瞿醯經中說也次當作金剛線法凡作線當擇上好劫貝縷香水洗之極令清淨令潔淨童女子右縒合之合五色縷當用五如來真言各持一色然後以成辦諸事真言總加持之造漫荼羅線亦爾五如來色者謂大日佛加持白色寶幢持赤色華開敷持黃色無量壽持綠色皷音佛持黑色阿闍棃先自取線三結作金剛結用繫左臂護持自身次一一為諸弟子繫臂如是攝受弟子則入漫荼羅是離諸障難也其金剛結法不可縷說當從阿闍棃面受之復次五色綖者即是如來五智亦是信進念定慧五法以此五法貫攝一切教門是故名為修多羅古譯謂之綖經也若見諦阿闍棃能以如來五色智加持弟子菩提心中五種善根貫攝萬行繫持瑜伽之臂使經歷生死常不失壞若能如是攝取弟子乃名善作金剛結也阿闍棃言此夜作弟子法時其所供養當減第七夜之半又當觀彼情機讚揚密教發生樂欲堅固其心并為分別十種方便學處然此三世無礙智戒凡結緣者皆令預聞其四種根本三昧耶一偈則當耳語誡之具支灌頂者乃應聞耳其所教誡二偈亦是阿利沙能具誦梵本益善列之于左阿儞也二合從今也庾􅋁澀磨二合汝也鼻囉覩邏無對又無等邏婆引利也臘䭾獲也摩訶引􅇁怛麼二合鼻大我也曳曩諸也薩􅞣嚩一切也爾奈平佛也喻延汝也娑補怛賴二合并菩薩也𭌆訶此也赦娑泥教也薩􅞪囉梅二合一切也跛𭌆蟻哩二合係多引薩佗二合攝也闍耶摩囊生也麼扈大也捺耶引辦事也帝曩喻延汝也摩訶引夜泥引大乘也􅁔溼附二合若哆醯明晨生也婆尾屣也二合佗得也偈意云汝從今以去便為已獲無等之利位同於大我大我謂諸如來成就八自在我於法自在者及諸菩薩摩訶薩埵也次云一切諸如來并此教中摩訶薩眾一切皆已攝受於汝此教謂此大乘祕教中十佛剎土金剛菩薩等也次云成辦於大事者即是能成大事成辦大事因緣所謂開示悟入如來知見故經中會意言之次云汝等於明日當得大乘生謂入大悲漫荼羅得灌頂已生於一切如來種姓之中也復次離緣業生得大空生故云大乘生也時阿闍棃如是教誡印持竟還令次第於漫荼羅外東向而坐阿闍棃復當供養以至誠心迎請諸尊言我於明日為哀愍弟子供養諸聖尊故建立大悲胎藏漫荼羅隨力供養唯願慈悲憶念當於明日悉皆降集漫荼羅而作加持大意如此餘如瞿醯中說彼至誠三請已宣說金剛句偈稱歎諸尊然後如法發遣復為弟子廣說法要教令繫念思惟藉吉祥草面向東而寐彼於夢中若獲種種境界晨起皆當白師則知行人悉地成不咸之相也若見諦阿闍棃自當住深瑜伽明見弟子本末根緣無有錯謬設不作如是事相及隨順世諦行之一切無咎若未見諦師則當謹依法則勿令虧失也經云夢中見僧住處者謂所見清淨微妙種種嚴飾身入其中禮跪旋遶遇諸慶善之事園林者謂所見滋榮殊特華果繁盛或親自採掇或昇踐樹杪履空而行堂宇謂種種華房綺疏殊異嚴好而在於中自在受用身心適悅樓觀謂層臺顯敞遠覿四方見種種勝境神情熈暢凡如是比皆為吉祥是中法門所表亦如擇地中說若與此相違如見塔寺焚摧荒穢之類即非善夢也幢謂旗幟寶幢峻高端麗而現其前或用麾導眾人莫不從命建立大菩提心軌成萬行之像葢謂孔尾等五色閒錯或在空中而蔭其上或人授與之執以遊行是悲願普覆之像摩尼珠亦謂圓明照徹或能出生眾物給施眾人此是淨心覺寶四攝利佗之像刀謂瑩飾鑒徹精剛銳利或人授與或自執持是慧性成就之像悅意華謂種種水陸生華隨其性類有上中下如色以鮮白為上味以甘醇為上皆善萌開發之兆當以意分別之女人是三昧像男子是智慧像亦取端正威德人所愛敬之類密親謂父母等善友謂傳法上人善知識等或見牸牛群牧乳味豐盈或人搆之或自飲吮皆是大悲漫荼羅醍醐上味之像或見經夾淨白無垢整齊嚴飾字色分明記說種種殊勝之事則為善相若卷帙垢壞字義殘缺之類當知不善或見諸佛親為摩頂現前記莂以微妙音而慰喻之或見聲聞辟支佛等乃至住虗空中示現無量神變皆當隨事甄擇識其所為因緣諸果謂世所希有珍奇妙果或有人授與或從空下等皆悉地之像或渡河池大海乃至自夢飲之須臾皆盡皆為吉祥若漂流湮溺無所拯援之類當知不善或聞空中有種種好聲歌詠法音奏諸伎樂或稱揚三寶功德心所樂聞或言吉祥或言應當與汝意樂之果如是等皆為善夢當以上中下類而分別之如寺宇等則有依地在空之別其所見人亦有男女聖凡之異是故經云宜應諦分別之若與如前善相相違或夢其身為狂象等所逐恐怖危急或乘駝驢或見可惡弊惡之人服飾弊壞或自見身轉臥青泥糞穢之中或諸不淨從空而墮皆是相違相也若是深行阿闍棃自當於瑜伽中知彼所夢之事及所為因緣弟子晨起白師時當隨機勸發斷彼疑網也若觀彼人無有成辦之理則不應具足傳法與之恐彼久無功効或生疑謗故也或如瞿醯所說為作寂災護摩得離諸障然後召入若見種種殊勝境界應以法言慰喻令得歡喜所云善住戒者梵云謂之蘇嚩囉多是弟子之美偁如言佛子之類也經中說偈亦是阿利沙兼誦梵本彌善亦具存之于左翳紗此也磨􅖱喇伽二合道也嚩囉願也𭌆二合瞞引殊勝也德也摩訶引大也夜囊乘也摩護大也捺也心也曳曩能也庾延汝也儼弭灑所演也覩求也婆費成也設佗就也怛佗揭哆如來也􅁥薩娑𢬸反焰部無自然智也摩訶引娜伽大龍也薩􅞣摩嚧羯世人也寫二合制𫪭邪敬如塔想也阿悉𫪭二合有也那悉𫪭二合無也尾也二合俱也𫪭羯囒二合多越也磨迦引奢虗空也弭嚩同也涅無也麼嵐垢也嚴避囒深奧也薩􅞣婆二合一切也達􅝣謎鼻上法也𡅘鉢囉二合底􅁺怛堅世智不能了知也摩那引羅閻無含藏也薩􅞣囉麼二合一切也鉢羅二合半遮囉喺單離一切戲論妄想鉢囉二合半制無戲論也𡅘無故也盋囉半只單亦是戲論重言也薩􅞣婆一切也吃哩二合耶引避所作也囉覩囒無比也薩𫪭也二合諦也捺嚩二合也二也參引磨設囉二合閻依也伊能奴痕反此也呾你夜二合引囊乘也沫無渴也囒願也室二合瑟咤敕閑反殊勝也羅避設二合佗得也捺曳道也薩𭍑二合哆住也凡梵本說偈了皆加助句聲云伊𫪭也初半偈稱歎祕密乘道殊勝願者所謂一切智願也若入此淨菩提門則照見心法明道所謂古佛大菩提道故云此殊勝願道也大心義如前摩訶薩埵中說過去未來現在諸大心眾無不乘是寶乘直至道場故云大心摩訶衍也次一偈讚歎行人發菩提心功德即以一切如來必定法印為授與大菩提記故云汝今能志求當成就如來自然智大龍世間敬如塔也自然智是如來自覺自證之智昔所未聞未知之法自然了了現前無所罣礙故以為名摩訶那伽是如來別號以況不可思議無方大用也制底翻為福聚謂諸佛一切功德聚在其中是故世人為求福故悉皆供養恭敬汝今發菩提心亦能攝受一切如來無量福聚是故世間應當敬如塔想也次有一偈半顯示淨菩提心如實相印即是開佛知見使得清淨也有無悉超越者即是從眾緣生不可思議中道出過斷常非有非無一切心量所不行處故名無垢同虗空金剛智印也諸法甚深奧者以心性甚深故當知陰界入等乃至一切種智皆亦甚深以一切法不出心實相故如是實相唯佛與佛乃能知之非思量分別之所能及故云甚深奧也世智不能了者言此心性非一切世間聰慧利根者所能思議假令長爪梵志等諸大論師以種種因喻莊嚴比況量度終自非其境界苦思惟推求徒令發狂獨有信力堅固者依此祕密方便乃能入之耳無含藏者所云難可了知者正在如是無含藏處以如實知蘊阿賴耶本不生故無所執受亦無含藏爾時一切心意識妄想戲論皆悉清淨法界圓照如秋月在於空故次句云離一切妄想也梵本云離一切戲論妄想今以偈中語略省又意義無異故不具存次句云戲論本無故者若具存梵本應言戲論無戲論故以一切戲論皆悉從眾緣生無有自性無有自性故即是本來不生是以釋前句云即此戲論自無戲論也今以會意言之故曰本無次有二句明此淨菩提心究竟方便以出過一切妄業即能成就如來智業普門導利無非大事因緣是故一切所作皆無倫匹是故云一切業無比也次轉釋前句統論權實之大綱故云常依於二諦即是論云諸佛說法常依二諦也然此經宗作種種具支方便皆隨世諦由此因緣得一切智智即是真諦是故世諦為因真諦為果因如四味皆悉無常果如醍醐是則為常然以十緣生句觀之世諦實相即是第一義諦是故權實相即俱不可思議也此二句文雖簡略能令行者於一切如來方便無復餘疑故當觸類而長使貫通一部文義耳已略開示大菩提道竟又結觀印持故云是乘殊勝願汝得住斯道亦是重明授記之意也爾時住無戲論執金剛白佛言願說三世無礙智戒若菩薩住此者令諸佛菩薩皆歡喜故者上文但說受三世無障礙戒未顯其相是住無戲論金剛重開發問也復次世尊所以待問方說亦為法門眷屬相發明故今此淨戒正以住無戲論金剛智印為體所以特告此尊欲令人法相應流傳有寄也阿闍棃言此戒相亦是加持句若傳授時先當誦持梵本然後以方言釋之彌善也今具列于左室哩奴能矩反諦聽也矩羅補怛囉二合族姓子也怛慘沫無渴反囒彼戒也曳入怛囉二合若也矩羅補怛囉二合族姓子也迦引耶嚩􅃚岌莽二合娜娑身語意也謎羯怛囉二合儞吃鎩二合布那引囕婆合為一也阿吃𭌆二合邪不作也薩􅞣囉麼二合達􅝝麼赦平一切諸法也迦哆麼室者娑云何名也也阿去􅇂怛莽婆去嚩觀自身也盋𭌆怛也二合隅捨奉獻也勃駄菩提薩哆吠二合𡃇佛菩薩等也怛羯􅋌娑摩二合睇覩引何以故哩庾喺何以反阿引怛麼二合婆去𮢥平如自身也盋𭌆𫪭也二合若𫪭捨施也諦娜嚩薩覩二合怛𭌆二合怛𭌆延彼三物也鉢𭌆𫪭也二合羯單二合婆去嚩𫪭捨作也羯哆莽室者二合怛娜嚩入二合窣堵怛囉二合延云何名三物也也弩哆迦引耶引縛􅃚岌莽娜伊上𫪭謂身語意也怛􅋌薩瞞怛􅟙𭌆係二合是故也俱羅補怛囉二合善男子也迦引耶嚩􅃚岌莽娜三嚩囉三勿㗚二合帝那受身語意戒也菩提薩怛吠二合娜菩薩也婆尾怛勿𦦨二合當得也怛羯􅋌娑摩二合睇覩引何以故也㗚曩二合迦引耶嚩􅃚岌莽娜珊引鉢𭌆𫪭也二合爾也二合捨離彼身語意也釋叉釳囉訶赧平應當學也矩入蔓無寒反𫪭作於也菩提薩埵引摩訶薩埵伊𫪭菩薩摩訶薩也伊𫪭是助句聲也初句言佛子諦聽者梵云矩羅是族義部義補怛羅是男子義若世諦釋於四姓中生皆名大族故名族姓子也今得生如來家於諸族中最為殊勝故名族姓子阿闍棃言宜會意云佛子於義為當也經云若族姓子住是戒者當以身語意合而為一者此戒梵云三縛囉是共緣共成此戒之義所謂慧方便等之所集成若尸羅者但是清淨義也又三縛囉是平等義佛言以身口意合為一者即是住三平等法門是故得名三世無障礙智戒也如佛為諸聲聞略說教誡則云此三業道淨是大僊人道從十二秊後稍演其義成種種律儀今此持明略戒義亦如是若行人三業方便悉皆正順三平等處當知即具一切諸佛律儀也復次裂諸想網是三嚩囉義謂戲論諸見之網經緯相成重複交絡故名為網今行者觀身口意業自無別體統末歸本唯是一心而此心實相常是平等法界是故住此戒是種種身口意業皆同一相無量見網皆悉淨除是故得名住無戲論金剛印也經云不作一切諸法者種種五陰依煩惱煩惱依於業是種種業皆由身口意生如約身口意分為十種善惡業道究其條緒即是無量無邊是故三業凡所修行即有進趣之行失進趣者即為倒想由倒想故有無量想生為此諸想所礙不得佛無礙智今行者深觀十緣生句了知三業畢竟不生法性自爾常無動作是名為住無為戒也如是淨戒尚非如來所作況住斯戒而造作諸法耶經云云何為戒所謂觀察捨於自身奉獻諸佛菩薩何以故若捨自身即為捨彼三事何等為三謂身口意次明持無作戒具足慧方便也行者觀身實際中身不可得即是如來解脫是故罄捨此身用施一切如來從此以後動止施為凡有所作皆為如來解脫非為己身也雖種種熾然萬行莊嚴佛土成就眾生法性自爾非所造作也其能如是奉修者是名無邊福聚是名無盡福河隨造涓滴善根以投法界海中故乃至極眾生界亦無窮竭阿闍棃言梵本論中有偈云若有解脫人持此解脫法供養解脫者此福最為勝若真言行人不曉如是淨戒則雖口誦真言身持密印心住本尊三昧具修次第儀式供養諸尊猶名造作諸法未離我人之網云何得名菩提薩埵耶故經次云是故族姓子以受身語意戒得名菩薩所以者何離彼身語意故菩薩摩訶薩應如是學此中應學舊譯名為式叉迦羅尼猶如第五篇戒總攝毗尼犍度威儀行法大乘學者亦如是當持此戒方便普入一切真言行中苟戒有虧而得成菩薩行無有是處也經云次於明日以金剛薩埵加持自身為世尊毗盧遮那作禮者即是受戒之明日謂第七日暮滿也造漫荼羅諸作務時皆當用金剛薩埵加持自身謂觀自身即是執金剛也是中方便如下品經文及供養次第中說若見諦阿闍棃則是住於金剛薩埵心所謂無等等菩提心也以此祕密加持故諸有所作無能俎壞之者次當如前運心為大日如來作禮然後持誦降三世真言加持淨缾此亦是成辦諸事真言也先當取如法淨缾汲清潔之水如法灌漉中置五寶五穀又取種種香水眾妙華果枝插中種種莊嚴用鮮淨帛繫頸皆應依供養次第辟除去垢淨以法界心字然後加持也大氐凡真言遍數無有定限應以字計之如蘇悉地中說又彼中隨作三部漫荼羅各用部心或部母真言加持今此經中通用辦事真言加持其真言又兼廣略故不具言遍數當以意裁之若極大者誦至百遍次者五百遍小者令至于千遍也既加持竟當置在白檀先所規畫壇門之外欲入漫荼羅者當先以此灑之令彼宿障淨除方得見漫荼羅也又於別器調和香水以金龍腦旃檀等種種妙香亦以真言加持授與令飲少許此名金剛水以祕密加持故乃至地獄重障皆悉除滅內外俱淨堪為法器也阿闍棃言此即名為誓水亦順世諦猶如盟誓之法令於一切眾聖前歃此香水自誓其心要令不退大菩提願也復次以無礙戒香和合嚩字門清白心水諸有飲觸之者皆必定成於無上菩提如此清淨其心則堪入祕密漫荼羅也爾時執金剛祕密主以偈問佛以下明造立漫荼羅支分偈中先讚歎佛唯願一切智諸說法中最第一者說彼時分也此時分即是初畫漫荼羅迄事竟以來時分限劑次云大眾於何時普集現靈瑞者謂大悲胎藏中一切普門隨類身於何時普集道場現前神力加持示現威驗也若弟子諸根淨利應度機深或於此時即親覩無邊聖眾如靈山會坐者同見三變淨土分身諸佛無有異也當知爾時即是漫荼羅阿闍棃傳持誠諦之語行如來事時故云殷勤持真言也說此偈已爾時世尊告持金剛慧者言常當於此夜而作漫荼羅謂於此第七夜中使法事都畢也是中從日沒後至明日明相出以來總名為夜初入夜分即當圖畵諸位安置諸供養具皆明相未出已前使發遣竟若違此法則生障礙乃至令所依住處亦不吉祥也然深祕密釋中正以道機嘉會為時或以加持方便促百劫為一夜或演一夜為百劫脩短在緣無有定限也若淺行阿闍棃則須具依法則於晝日分即當規畫界域以白檀等草定諸尊形位分段至明日將夕豫備香華燈燭等皆令素辦瞿醯云於漫荼羅北面一處以白色規畫辦事真言辟除諸難置諸供具也阿闍棃言若不能於一夜中遍畫諸尊者從第五日受持地以後漸次作之於理無妨又別有尊形印字三種方便如下文所說也經云傳法阿闍棃已知時分即明造立軌儀至日入時阿闍棃及助伴弟子各如法澡浴已著新淨衣興大悲心齎持供物往詣漫荼羅所先應一一具法加持如供養次第中說次當如法護持自身呼所度弟子為彼作護灑以香水皆令一處次第而坐然後阿闍棃至道場門前普遍運心稽首頂禮十方一切諸佛亦如上說然後持五色線向漫荼羅位住立而頂戴之次觀自身作毗盧遮那經所謂大毗盧遮那而自作加持也所以然者以大日如來是此大悲胎藏阿闍棃是故行者若行阿闍棃事時即應以自身作毗盧遮那若作緣漫茶羅諸作務時即以自作身金剛薩埵其加持方便如下文及供養法中說也復次行者應知護方八位凡所造作漫荼羅隨此而轉東方因陀羅南方𦦨摩羅西方縛嚕拏北方毗沙門東北伊舍尼東南為護摩西南方涅哩底西北為嚩庾其上方諸尊多依帝釋之左下方諸尊多依龍尊之右上謂空居下謂地居也又環中胎藏三重界域皆以豫為標誌使方隅均等圖位素定要令大日之位當五種寶聚之心至此圖眾相時阿闍棃先至因陀羅方如法作禮次住火方北向而立助伴弟子在伊舍尼對持修多羅準定外界弟子次當右遶至涅哩底師亦右遶西向而對持之阿闍棃次復右遶至嚩庾方弟子亦右迴北向而對持之弟子復右遶至伊舍尼師亦右迴東向而對持之凡一周竟皆令當臍在虗空中均等平正已至第二周亦如前右轉次第絣之以為界道次復準定四維阿闍棃復當右遶至涅哩底而弟子先在伊舍尼方右轉相向持之弟子次復右遶至嚩庾方師即右轉至護摩方弟子亦右迴相向持之皆令當臍而在空中準定其位弟子次復右遶至涅哩底師即右轉至伊舍尼相對絣之弟子次復右遶至護摩方師即右轉至嚩庾方亦相對絣之阿闍棃言其正四方十字界道經雖不言理必有之亦須右旋相對絣定也如是已定外界及八方相竟次當入中先定中胎外界亦如前旋轉絣作四方相其八方相已定更不復作也初定第一重外界次定第二重外界亦同中胎法則其廣狹之量皆當展轉相半假令中胎藏縱廣八尺第一重當廣四尺第二重當廣二尺第三重當廣一尺阿闍棃言本法如此若恐大小相懸不相稱者稍以意均調之於理無失也如是分竟復於一重一重分為三分其最向裏一分是行來周道故云佛子所行道次一分是安置諸供養物處次外一分是安置諸尊座位故此二分皆是聖天之位處也次於此外復作周帀界緣於此虗空位之中當運心觀察隨其方面分位相應諸尊皆都請供養所以爾者為阿闍棃臨事有所妄誤安置諸尊或不周悉其應請召而無位次者皆當運心於此中供養也分此三分位法先於第一重外界之裏隨取少分用作界緣其闊狹之量當以意裁之趣得稍通座位也於此界緣之內作三分均分之當先定諸尊座位內界分了次定行道供養中間界分如是第一重竟次於第二重亦從外向裏漸次分之次分第三重亦如是如上文所說從大日如來以下光明是此第三重位自臍以上至咽所出光明為第二重位自咽以上乃至頂相之光明為第一重位其中胎藏即是毗盧遮那自心八葉華也所共建立漫荼羅金剛弟子須善通達真言法要亞近於師則能更相佐助無所遺失若不得如是人但取已曾如法灌頂者臨事指授行之也又無此人者當置橛為之先於火方師位下橛次伊舍尼方亦置之引線已即師先心記火方橛此是師位然後從伊舍尼引線至涅哩底方餘準此行之可知也阿闍棃又云欲共引線要須取所欲灌頂弟子耳先以加持香水灑之與共行事所畫壇位等且以物覆之勿令見也方等有四門者謂三重院皆設四門使中正均等開西向一門以通入出餘門以線界橫斷之瞿醯云凡諸方開門皆隨彼方隅廣狹準為九分取中一分為門其餘八分則於門之左右各得四分所出入門稍令闊作自餘諸門以白色末作畫閉之阿闍棃言用金剛線作界橫斷竟猶如金剛不可越之越者犯三昧耶又經文通門西向若有因緣向餘方開之於理無咎也餘如下文所說誠心以慇重運布眾聖尊者謂圖畫時先住瑜伽觀此漫荼羅大會一一形色相貌威儀性類座位諸印皆悉現前具足明了然後以無量殷勤恭敬心而綵畫之乃至大小疏密之度亦令均停相稱故云如是造眾相均調善分別也內心妙白蓮者此是眾生本心妙法芬陀利華祕密幖幟華臺八葉圓滿均等如正開敷之形此蓮華臺是實相自然智慧蓮華葉是大悲方便也正以此藏為大悲胎藏漫荼羅之體其餘三重是從此自證功德流出諸善知識入法界門耳正方四葉是如來四智隅角四葉是如來四行約此現為八種善知識各持金剛慧印故云遍出諸葉間也如是十六法一一皆等法界乃至無有少分不平等處故其標相亦與冥符略攝如來萬德以為十六指申而長之則無量無邊故此漫荼羅極小之量劑十六指大則無限也䰅蕊是一切三昧門陀羅尼門六度十八空等如大般若之所說從此一一䰅蕊以加持神力故現出三重漫荼羅中一種莊嚴眷屬也此是如來祕傳之法不可形於翰墨故寄在圖像以示行人若得深意者自當默而識之矣從此實相華臺中則表大日如來加持之相其義已如前釋所餘祕密八印下品及圖說之次於東方內院當大日如來之上畫作一切遍知印作三角形其銳下向純白色光焰圍之在白蓮華上即是十方三世一切如來大勤觔印也亦名諸佛心印也三角是降伏除魔障義謂佛坐道樹以威猛大勢降伏四魔得成正覺鮮白是大慈悲色也如來師子奮迅大精進力正為是事因緣乃至放大悲光常遍法界故云普周遍也次於大勤勇北至於北維置虗空眼即是毗盧遮那佛母佛母義如般若經佛母品中廣說真金是如如實相之體畢竟淨句是彼教門之外飾故曰縞素以為衣一切戲論滅時心日光明無所不照故曰遍照猶日光恬泊一心人乃能見此故其幖幟猶如天女住於正受之像也次復於大勤勇南至於南維作一切諸佛菩薩真陀摩尼印此是淨菩提心無邊行願之所集成常能普雨世出世間一切財寶諸救世者皆從性淨蓮華臺中現如是寶故云住於白蓮上阿闍棃言此是通一切印亦可於諸方面皆置之若諸佛菩薩經中不言所持印相者亦執此無價寶珠皆得也大凡此第一重上方是佛身眾德莊嚴下方是佛持明使者皆名如來部門右方是如來大悲三昧能滋榮萬善故名蓮華部左方是如來大慧力用能摧破三障故名金剛部也是故入阿字門一切諸法不生是法身義入婆字門一切諸法無染著是蓮華義入嚩字門一切諸法離言說是金剛義如下字輪品中以此三字統攝百明意在此也經云大日右方置大精進觀自在者即是蓮華部主謂如來究竟觀察十緣生句得成此普眼蓮華故名觀自在約如來之行故名菩薩頂現無量壽者明此行之極果即是如來普門方便智也此像及菩薩身皆作住現法樂熈悅微笑之容觀自在身色如淨月或如商佉即是上妙螺貝或如軍那華其華出西方亦甚鮮白當總此三譬言其光鮮潤徹白中之上也次於觀音右邊畫多羅菩薩凡諸聖者皆面向大日今言觀音右邊即是座西佗皆倣此此亦是觀自在三昧故作女人像多引羅是眼義青蓮華是淨無垢義以如是普眼攝受群生既不前時亦不後時故作中秊女人狀不太老不太少也青是降伏色白是大悲色其妙在二用之中故令二色和合以是義故不青不白也其像合掌掌中持此青蓮手面皆向觀音如微笑形通身圓光如淨金色被服白衣首有髮髻作天髻形不同大日髮冠也觀音左邊置聖者毗俱胝其身四手右邊一手垂數珠鬘一手作施願印左邊一手持蓮華一手執軍持面有三目如摩醯首羅像首戴髮冠如毗盧遮那髮髻冠形所云持者如言地持萬物即是載承之義也其身潔白圓光圍之光中具有黃赤白三色不純白純赤純黃故云無主凡黃為增益色白者寂災色赤者降伏色以此三昧光中兼具三力是故用為幖幟也次近毗俱胝左邊畫得大勢尊如世國王大臣威勢自在名為大勢言此聖者以至得如是大悲自在之位故以為名所以持未敷蓮華者如毗盧遮那實智華臺既成果已復持如是種子普散一切眾生心水中更生未敷蓮華此尊迹同是處亦能普護一切眾生潛萌之善使不敗傷念念增長即是蓮華部持明王也次於明王左邊畫明妃耶輸陀羅譯云持名稱者身真金色以諸瓔珞莊嚴令極端嚴如天女之像右手持鮮白妙華枝果葉相間長條茂好其華或有初疱或有欲開或有正開敷者若五若十乃至數十左手持鉢胤遇華亦是西方勝上之華以得大勢明王主安立一切眾生菩提種子而此明妃主含藏出生此中種種功德故其被服幖幟皆與此義相應也多羅之右置半拏囉嚩悉寧譯云白處以此尊常在白蓮華中故以為名亦戴天髮髻冠襲純素衣左手持開敷蓮華從最白淨處出生普眼故此三昧名為蓮華部母也次於觀自在下置何耶揭唎婆譯云馬頭其身非黃非赤如日初出之色以白蓮華為瓔珞等莊嚴其身光焰咸猛赫奕如鬘指甲長利雙牙上出首髮如師子項毛作極吼怒之狀此是蓮華部忿怒持明王也猶如轉輪王寶馬巡履四洲於一切時一切處去心不息諸菩薩大精進力亦復如是所以得如是威猛之勢於生死重障中不顧身命多所摧伏者正為白淨大悲心故故用白蓮瓔珞而自嚴身也已如法建立觀音諸眷屬竟次於大日如來左方安置金剛部主所謂執金剛能滿一切願者其色如鉢胤遇華是淡黃色也或如綠寶是綠羯寶猶如虗空顯色也以淨法界色與金剛智體和合是故其身黃白如是智身猶若虗空不可破壞一切無能降伏之者故用虗空顯色以為幖幟此意言若法乃至少分猶如極微是可得者則為無常變易諸行所隨是故畢竟空智於堅固性中最為第一所持密印即是五股金剛也五如來智皆兼權實二用而以金剛慧手執持其中故云右執拔折羅此印當以光鬘普遍圍遶故云周環起光焰也首戴三峯寶冠形若山字峯間如仰偃初月之形以種種微妙雜寶一切瓔珞莊嚴其體此意言般若波羅密多至果地心中轉名一切種智故云首戴眾寶冠以此妙慧廣歷一切諸法自在旋轉出生無量法界莊嚴故云間錯互嚴飾廣多數無量也次於金剛部主之右置忙莽雞所謂金剛部母亦持金剛智杵以諸瓔珞嚴身此是出生金剛智力王三昧所謂金剛三昧也次於部母之右置大力金剛針素支譯云金剛針持一股拔折羅以為幖幟此拔折羅是一相一緣堅利之慧用此貫徹諸法無所不通故名金剛針也其下有二使者皆女人形䠒跪微笑而瞻仰之其狀卑而充滿淺黃色以金剛為幖是彼摧壞重障三昧也次於執金剛之左置金剛商竭羅譯云金剛鎖其印執持連鎖兩頭皆作拔折羅形鎖下亦有二女使者與金剛針使者無異以此智印攝持一切剛強難化眾生使不退於無上菩提故以為名也次於執金剛下置忿怒持明降伏三世一切大作障者號月黶尊面有三目四牙出現如夏水雨時雲色作大笑之形以金剛寶為瓔珞此是持金剛者以無量門大勢威猛攝護眾生三昧也以無量眷屬而自圍繞皆悉卑而充滿作忿怒形乃至一身具百千手操持種種器械豎立森然若不可盡畫者要作一二使者乃至五六皆應住蓮華上意明此蓮華心中法爾成就一切勇健大精進力不從餘處來也已建立金剛薩埵諸眷屬竟次往西方畫如來持明使者及諸執金剛眾有種種形色性類種種密印幖幟皆於圖中出之是一一尊大慧光明悉遍法界所現身口意密亦遍法界故云普放圓滿光為諸眾生故也於此下位依涅哩底方畫不動明王如來使者作童子形右持大慧刀印左持羂索頂有莎髻屈髮垂在左肩細閉左目以下齒齧右邊上脣其左邊下脣稍翻外出額有皺文猶如水波狀坐於石上其身卑而充滿肥盛作奮怒之勢極忿之形是其密印幖幟相也此尊於大日華臺久已成佛以三昧耶本誓願故示現初發大心諸相不備之形為如來僮僕給使執作諸務所以持利刀羂索者承如來忿怒之命盡欲殺害一切眾生也羂索是菩提心中四攝方便以此執繫不降伏者以利慧刀斷其業壽無窮之命令得大空生也若業壽種除則戲論語風亦皆息滅是故緘閉其口以一目視之意明如來以等目所觀一切眾生無可宥者故此尊凡有所為事業唯為此一事因緣也鎮其重障盤石使不復動成淨菩提心妙高山王故云安住在盤石也復次於下方西北隅際作降三世忿怒持明王尊首戴寶冠持五股金剛印瞻仰毗盧遮那如請受教勅之狀偈云不顧自身命者謂應圖作至極忿怒奮迅不顧命之容謂欲攝召法界眾生皆使順從法王威命此亦是成辦諸事真言也為此五如來智大自在力之所滌除摧滅者皆悉至於果地莊嚴非唯無所障礙偏證但空而已是故持五股印首戴寶冠而在風輪之中即法華經諸有所作皆為開佛知見使得清淨之意也已安立第一漫荼羅上首竟次往第二院畫釋迦牟尼阿闍棃言此中第二是隱密語耳若從中向外當以釋迦牟尼眷屬為第三院今則以毗盧遮那法門眷屬為第一釋迦牟尼生身眷屬為第二諸菩薩在悲智之間上求下化故為第三所以如此互文者此是如來祕藏為防諸慢法人不從師受者變亂經文故須口傳相付也於東方初門中先置釋迦牟尼身真金色并具光輝三十二相所被袈裟作乾陀色坐白蓮華作說法之狀謂以左手執袈裟角如今之阿育王像右手豎指以空水輪相持是其幖幟也此白蓮華即是中胎淨法界藏世尊為令此教廣流布故以此生身幖幟而演說之然與本法界身無二無別故云住彼而說法也次於世尊北邊安置佛眼亦是釋迦牟尼佛母此方譯為能寂母也當作世間樂見端嚴無比之身通身皆有圓光喜悅微笑此是如來出生隨類形三昧此三昧正以大慈普眼為體觀察應度眾生而導利之慈眼之光無所不遍故云遍體圓淨光也次於佛母之北畫如來白毫相印住蓮華中作商佉色身有圓光手執蓮華如半敷之像內有如意寶珠此是如來無邊福業之所集成如觀佛三昧等經廣說故能滿足一切眾生願也次於釋師子之南置如來五頂第一白傘佛頂第二誓耶佛頂此譯為勝頂第三微誓耶此用多聲呼也譯為最勝佛頂第四諦殊囉施譯云火聚佛頂經云眾德者正譯當云大分是具大德之義也第五微吉羅拏譯云捨除佛頂是棄捨一切煩惱義亦是摧碎義也此是釋迦如來五智之頂於一切功德中猶如輪王具大威勢力其狀皆作轉輪聖王形謂頂有肉髻形其上復有髮髻即是重髻也餘相貌皆如菩薩令極端嚴歡喜所持密印如圖也次於東方最近北邊布列五淨居眾第一自在天子第二普華天子第三光鬘天子第四意生天子第五名稱遠聞天子當次第列之其印相具如圖說阿闍棃言此是五那含天子耳過此已上有菩薩受佛職位處亦名淨居天多是一生補處菩薩是第二院所攝非此中所明也此天次南毫相之右復畫三佛頂第一名廣大佛頂第二名極廣大佛頂第三名無邊音聲佛頂其形相皆同五頂是如來三部眾德之頂也其五種如來頂具有五種色所謂真金色金色淺黃色極白色淺白色是中真金金二色相似然真金光淨金色稍重也三佛頂則有三色謂白色黃色赤色此是兼具寂災增益降伏色也此八種佛頂皆周身有光光極廣厚以諸瓔珞嚴身由如來本誓願力故悉能滿足一切願也東南隅布列諸火天眾住火焰中額及兩臂各有三灰畫即婆羅門用三指取灰自塗身像也一切深赤色當心有三角印在𦦨火圓中左手持數珠右手持澡缾此是普門之一身為引攝火祠韋陀梵志方便開示佛圍陀法故示此大慧火壇淨修梵行之幖幟也次於右方東大日之南作焰摩􅁤法王手執檀拏印猶如棓形上有人首作極忿怒之狀以水牛為座身作黑玄色阿闍棃言少時甞因重病困絕神識往詣冥司覩此法王與后同共語言貌甚慈忍然此檀拏印以忿怒形撿初生來所犯口出火光至為嚴切及驗出家以後功業便爾寂然不復有言𦦨摩王及后尋即降階善言稱歎殷勤致敬求受歸戒因放却還比至蘇後其兩臂繩所繫持處猶有瘡旬月方愈也閻摩之西作𦦨摩后及死后亦是𦦨摩后也東邊作黑夜神及七摩怛里譯云七母皆女鬼也其形悉皆黑色次於西南隅畫涅哩底鬼王執刀作可怖畏形是護方羅剎王嚩嚕拏是西方護方龍王持羂索為印也於東方五頂之南當畫因陀羅釋天之主坐須彌山天眾圍遶首戴寶冠身被種種瓔珞持伐折羅及餘諸眷屬謂舍脂夫人及六欲天等具如圖中所示也釋天眷屬之南置日天眾在八馬車輅中并二妃在其左右所謂誓耶微逝耶譯云勝無勝也日天眷屬布諸執曜盎誐羅伽在西輸伽羅在東勃陀在南勿落賀􅁤薩鉢底在北設儞設遮在東南羅睺在西南釰波在西北計都在東北又於南緯之南置涅􅖽伽多謂天狗也又於北緯之北置嗢迦跛多謂流火也釋天眷屬之北近淨居天置大梵王戴髮髻冠坐七鵝車中四面四手一手持蓮華一手持數珠一手執軍持一手作唵字印此是左手也當稍屈頭指直申餘指側手按之而語是名淨行者吉祥印所餘四禪諸天皆列其左無熱等五淨居天列在其右毗尼所謂觀淨居天被服儀式制齊整著三衣內衣戒是也次西方近門置地神眾次北置薩囉􅁤薩伐底譯云妙音樂天或云辯才天次北并置其妃又次置微瑟紐舊譯謂之毗紐此是那羅延天也并置商羯羅天此是摩醯首羅於一世界中有大勢力非三千世界主也經中下文更有嚕㮈羅即是商羯羅忿怒身從事立名又置塞健那天即是童子天皆於其側置妃阿闍棃言此是天眾當於釋梵王左右序列之耳最西北隅置護方風天眷屬西門之南與日天相對應置月天乘白鵝車輅於其左右置二十七宿十二宮神等以為眷屬次於北門西當置毗沙門王於其左右置夜叉八大將一名摩尼䟦陀羅譯曰寶賢二名布嚕那䟦陀羅譯曰滿賢三名半只迦舊曰散支四名娑多祁哩五名醯麼嚩多即是住雪山者六名毗灑迦七名阿吒嚩迦八名半遮羅及訶栗底母吉祥天女舊譯云功德天女經文闕之阿闍棃言此天女隨毗沙門在北方若本位亦可置在西方也凡此等諸大天神皆是眾所知識世間眾生各隨性欲因緣宗奉供養毗盧遮那為欲普門攝眾生故遍一切處示同彼身即以世間共識之幖幟為出世間祕密之幖幟猶如帝釋之像安住妙高山王如來因陀羅三昧亦復不移此處開出淨菩提心妙高山王自餘法門例皆如是不可詳說但行者隨彼一一乘中功行成就自當開解耳又釋迦牟尼座下應作忿怒持明右邊號無能勝左邊號無能勝明妃並白色持刀印觀佛而坐其間所云地神者即前所說西門中地神當捧持寶缾虔恭長跪其缾中置種種水陸諸華餘如圖說并於通門第二重心廂曲之中置二龍王右曰難陀左曰䟦難陀首上皆有七龍頭右手持刀左手持羂索乘雲而住此皆漫荼羅中所要故云持真言行者當以不迷惑心依次作之也經云所餘釋種尊真言與印壇所說一切法師應具開示者如釋迦部中佛鉢錫杖印等其類甚多經不具出但隨此方空缺處採擇餘經所說逐便安置之設令缺之亦無過咎但經中所出上首諸尊等必應一一如法畫之不得遺謬其蓮華部金剛部等諸方亦例此可知也經中次說第二院菩薩眷屬當釋迦之內正東門中畫文殊師利身金色頂有五髻作童子形左持泥盧鉢羅是細葉青蓮華華上有金剛印熈怡微笑坐白蓮華臺此其祕密幖幟也阿闍棃言金即是閻浮金色用表金剛深慧首有五髻者為表如來五智久已成就以本願力因緣故示作童真法王子形青蓮是不染著諸法三昧以心無所住故即見實相金剛智印能以常寂之光遍照法界所以坐白蓮者意明不異中胎藏也文殊北邊當畫光網童子菩薩身真金色執持寶網以種種瓔珞莊嚴坐寶蓮華中文殊師利持無相妙慧而光網持萬德莊嚴如智度所說以鹽調和諸食倍增其味而不可空噉故行人失般若方便單修空慧即墮斷滅中純修福德即墮有所得中所以觀佛長子者意在此也次作文殊五使者一名髻設尼二名優婆髻設尼三名質多羅四名地慧五名請召於妙吉祥左右次第列之葢各持文殊一智也髻設尼是髮端嚴義鄔波是其亞者文殊以五髻徵表五智故此使者亦以美髮為名質多羅是雜色義其五使者下各作一奉教者皆跪向使者如承受宣告之形悉是文殊三昧故經云侍衛無勝智也次於第二重大日如來左方畫除葢障菩薩西方俗法東向而治故以東為初方南為右方西為後方北為勝方今此漫荼羅壇門向西故當大日左方也圖中除葢障菩薩左手持蓮華華上有摩尼寶珠右手作施無畏手此菩薩及諸眷屬皆是大慈悲拔苦除障門正以此菩提心中如意寶珠施一切眾生無畏滿其所願也經云捨於二分位當畫八菩薩者謂除葢障之側當作二使者然後如其次第置八菩薩凡列諸眷屬皆令最初者在右第二者在左第三復在右第四復在左如是一左一右次第置之今於此八菩薩中先以除疑怪在除葢障之右施一切無畏在左次復以除一切惡趣在除疑怪之右以救意慧在施無畏之左次復以悲念菩薩在除惡趣之右慈起菩薩在救意慧之左次復以除一切熱惱在悲念之右不可思議慧在慈起之左諸餘布位佗皆倣此也次於北方畫地藏菩薩於種種間飾雜寶莊嚴地上以金銀頗胝水精四寶為蓮華座亦令窮極巧麗其菩薩在華座上光𦦨周遍其身如在胎藏故云處於𦦨胎也此聖者主持寶王心地中性起功德無邊寶藏故其幖幟以一切珍奇雜寶綺錯莊嚴也其餘眷屬菩薩義亦同之當於地藏之右置寶處菩薩地藏之左置寶掌菩薩次於寶處之右置持地菩薩寶掌之左置寶印手菩薩持地之右又置堅固意菩薩如是上首諸尊又各各於其左右畫諸眷屬以自圍遶也次於西方畫虗空藏菩薩被鮮白衣左手持蓮華華上有大刀印刀上遍生𦦨光及諸眷屬皆坐正蓮華上此菩薩持如來等虗空慧所以持大刀者利慧之幖幟也被服白衣明白淨無垢是其教門外飾也譬如虗空無所分別亦無積集而世間萬像依之以生今此法門亦爾於畢竟空中出生不思議自在之用無有窮盡如大集虗空藏經中廣明故名虗空藏也此中法門眷屬所謂虗空無垢菩薩虗空慧菩薩清淨慧菩薩行慧菩薩安慧菩薩亦如前次第左右列之所以皆云等者明此上首諸尊復各有無邊眷屬也其形相皆如圖說此偈末云略說大悲藏漫荼羅位竟此二句是傳度者以義結之非經中本文也如上所說菩提心為因大悲為根方便為究竟者即是心實相華臺大悲胎藏開敷以大悲方便現作三重普門眷屬以是義故名為大悲胎藏漫荼羅也如於一世界中普現六趣隨類之身於一切世界中亦復如是於彼彼眾同分中最為上首其所說法亦於彼法之中微妙第一復由此義普能攝受無盡眾生故毗盧遮那名為法界王也今此上首諸尊同共集會印持如是法故彼一切同類眾生各各生希有心言我之所尊無與等者亦復在此眾中當知此法甚為希有以生希有心故隨於一法界門而種善根乃至長夜興不善根欲破壞正法者既至道場見彼所宗奉大天又蒙不思議法食之施惡心即滅棄捨魔事或生一念隨喜之心以生一念淨心故便可於中開出大悲胎藏漫荼羅也復次此漫荼羅種種法門雖同一法界然其功用淺深各有差別如一地所生一雨所潤然諸藥草木性分不同若醫王觀之則知如是如是藥草於某病中非對治所宜然於某病則勢力殊勝若於此等普門方便中一一分別不謬乃堪作大阿闍棃也十萬偈大本中彼諸聖尊各自宣說自所通達法界門種種異方便法今此略本但舉其普通趣道之要耳若行者如法修行不虧法則蒙不思議加被時自當曲示方便無所不通也阿闍棃言凡行者不住瑜伽不合為人建立漫荼羅也初欲畫時先用字門轉作諸尊座位形色性類一一相應即觀如是大悲藏即是我身方起手畫之若是深行阿闍棃則於一切時常不離如是佛會也畫了作法事時如法次第起金剛地觀此寶王宮殿在須彌山頂所有莊嚴皆如下品中說如是明了已方可請召也阿闍梨所傳漫荼羅圖位具列如左上方從南向北右方從上向下左方從下向上下方從北向南如來如意寶能授一切尊滿一切願也妙金剛降三世尊如來甲冑蓮華部母奉教者如來羂索蓮華部奉教者青金剛如來怖魔蓮華三股戟金剛蓮金剛鐸如來臍蓮華戟如來馬藏蓮華尊寂靜金剛如來脣金剛蓮大迅利金剛金剛羂索如來十力蓮華輪如來牙蓮華刀金剛牙金剛刀如來大護蓮華德菩薩那弭荼金剛因自立名又云短也無所畏大護者大水吉祥赤體金剛如來無所畏別所也大吉祥佛奉教者如來鈴鐸僧吉祥如來商佉佛吉祥越無量虗空如來三昧耶金剛金色菩薩月黶尊如來正勤名稱慧菩薩如來三昧耶白色菩薩難降伏大護者女像如來舌壞諸怖畏大護者金剛部生如來毫相大勢至菩薩一切如來座毗俱胝菩薩金剛連鎖不可越護門者如來大勤勇觀世音菩薩執金剛如來眼多利尊如來心觀音母金剛母如來鑠底大白菩薩無堪忍如來無堪忍資財主菩薩金剛針水自在尊遍觀菩薩如來法法德菩薩金剛鉤相向守護門者如來念處吉祥菩薩金剛無勝大護者如來使者如來刀帶塔德菩薩如來輪寶德菩薩軍荼利金剛金剛拳如來蓮華鹿皮衣形如來頂蓮華軍持大力金剛無戲論金剛如來結界蓮華鬘如來施願蓮華斧虗空無垢金剛金剛斧如來平等說蓮華索如來口蓮華鐸素囉多金剛妙住如來腰蓮華螺大身金剛金剛輪如來𦦨光蓮華使者大勝金剛金剛棓如來鉤蓮華部女使者馬頭觀世音廣眼金剛虗空眼蓮華棓拔折羅金剛聖不動尊右第一重竟東無垢光童子北賢劫菩薩南大慧菩薩西賢劫菩薩光網童子寂慧菩薩金光菩薩男奉教者行慧菩薩無垢慧菩薩金色菩薩寶德菩薩男守衛者勝妙大菩薩無盡意菩薩賢德菩薩男使者女使者寶嚴菩薩不思議慧菩薩華幢菩薩計都菩薩六面尊大慈起菩薩無垢光菩薩寶印手菩薩降閻摩尊無像菩薩救意慧菩薩地慧童子清淨慧菩薩寶掌菩薩優波計設尼施一切無畏菩薩虗空慧菩薩文殊師利地藏菩薩除一切葢障菩薩虗空藏菩薩計設尼虗空無垢菩薩質多羅寶作菩薩除疑怪菩薩法慧菩薩請召者除一切惡趣菩薩慧步菩薩持地菩薩女使者悲念菩薩亦名大悲經剌泥弭菩薩無牆也男使者賢意菩薩泥弭菩薩牆也女守衛者寶冠菩薩除一切熱惱菩薩寶幢菩薩女奉教者發心即轉法輪菩薩海慧菩薩金光菩薩光明菩薩寶冠童子善住意菩薩妙慧菩薩妙幢菩薩月光童子無邊幢菩薩善財童子賢劫菩薩賢劫菩薩賢網菩薩右第二重竟東火天護方神北伊舍那護方神南涅哩底護方神西風天護方神火天鳩槃荼眾眷屬女羅剎風神后火天后阿名揭拏羊耳波私瑟吒大仙阿濕嚩揭拏馬耳羅剎眾迦樓羅女竭伽大仙戍婆揭拏箕耳賢劫菩薩迦樓羅末建荼大仙雜寶藏神童男菩薩瞿曇大仙荼吉尼荼迦比丘眾非人眷屬一切人眷屬迦葉大仙童男菩薩日光菩薩諸執曜神等比丘眾西南方日輪遍照勝德佛童男菩薩比丘眾毗逝耶后離塵勇猛菩薩日天子東北方定勝手德佛菩薩眾寶勝菩薩逝耶后菩薩眾比丘眾西北方一寶葢佛那羅延并眷屬比丘眾童女菩薩比丘尼眾魔天佗化自在天童女菩薩苾陵蟻㗚知童女眾化樂天女部多兜率陀天部多藥叉類諸毗那夜伽賢劫菩薩焰摩天住雪山藥叉將摩訶迦羅黑神小訖㗚瑟拏二龍王東方提頭賴吒天王并健闥婆眾沙多祁㗚藥叉將訖栗瑟拏二龍王優波路係多二龍王舍支夫人半遮羅藥叉將毗盧遮那十眷屬路係多二龍王帝釋三十三天毗灑迦夜叉將優婆臂多二龍王童子菩薩痾吒嚩迦藥叉將毗舍支十眷屬臂多三龍王比丘眾毗沙門子藥叉將優波束訖勞三龍王歡喜菩薩束訖勞二龍王上方歡喜德菩薩摩尼拔陀羅神沙伽羅龍王菩薩眾護方神后寒冷地獄阿那婆達多龍王童女菩薩俱吠囉護方神毗沙門熱惱地獄得叉迦羅龍王吉祥功德天摩迦斯龍王阿難陀滿賢藥叉將毗樓博叉天王矩利迦龍王須菩提訶栗底母男五女五羯句吒迦龍王舍利子閻摩物㗚底后和修吉龍王大目連散支大將閻摩后阿難陀龍王大迦葉童男菩薩閻摩但荼大蓮華龍王波頭摩龍王無量音聲佛頂比丘眾閻摩羅法王商佉龍王廣大佛頂勝授菩薩質呾羅笈多訊獄者縛嚕拏后縛嚕拏龍王火聚佛頂北方勝德佛夜黑天毗樓勒叉護方天王勝佛頂菩薩眾辯才天如來錫杖比丘眾童男菩薩優波遜那守門者如來鉢童女菩薩比丘眾通門如來牙賢劫菩薩離憂菩薩遜那守門者豪相主田農神南方無憂德佛地神無能勝尊主象馬廐神菩薩眾龍王并后眷屬釋迦牟尼佛比丘眾童男菩薩無能勝妃主王庫藏神童女菩薩比丘眾佛母主外道福處神別異地獄行慧菩薩如來鑠底印主巖穴神賢劫菩薩西方寶焰佛童男菩薩主伏藏神遮悶挐菩薩眾比丘眾比丘僧主磧神嬌吠唎童女菩薩普光菩薩主尸林神吠瑟拏味主互相侵神東方寶性佛主陂池神主日歷神菩薩眾主龍泉神嬌唎主時分神比丘僧主井神燕㮈唎主葉作神童女菩薩主空中宮苑神咾捺唎主宿神佛袈裟主宮室神末囉弭主宿對神佛軍持主海神緊那羅妃主夜神白傘佛頂主室宅神緊那羅主年神主月神主巷曲神童男菩薩主日神最勝佛頂主坊神比丘眾主六時神摧碎佛頂主街陌神蓮華手菩薩主直神主河神東南蓮華勝德佛主二十八宿神主十二宮神最高佛頂主道神菩薩眾日月后名赤色辟支佛主曠野神比丘眾月后名月神主郊野神童女菩薩月天子大梵并明妃眷屬主店肆神暮訶曩月后名月相四禪天主城神闕名火神童男菩薩無色天淨居自在天子主神劫微比丘眾普華天子主洲神芒囊娑蓮華勝菩薩光鬘天子主島神訖灑也下方蓮華德佛主山神社吒囉菩薩眾意生天子主悉地物神句路誕曩比丘眾名稱遠聞天子主悉地神沒栗拏童女菩薩賢劫菩薩大自在妃并眷屬主仙藥神露係多阿脩羅女眷屬大自在天并眷屬主藥計神芒嚕多阿脩羅眷屬摩醯首羅子及妃主藥神捺羅迦持明妃悉地持明妃娑摩醯捺摩睺羅伽女持明仙悉地持明仙諸大仙等摩睺羅伽右第三重竟阿闍梨言第一院東方如來鈎乃至如來甲等皆是毗盧遮那三昧一一作天女形如漫荼羅方圓以辨其色坐白蓮華臺上手中復持蓮華華上各以物像用為標幟如鉤輪刀槊商佉鈴鐸羂索甲冑等皆依本相畫之頂相豪相口舌牙唇牙等例推可解如來臍於蓮上圖作連環圓好之相如來腰亦頗旋曲如數珠鬘形如來藏如輪王馬寶藏相不現之形如來施願當作與願手如來法及辯說等或時持經藏或作說法手念處十力等皆是止觀相應法作寂然三昧之容三昧耶當作佛頂相如來頂相具攝一切功德凡手中無物可為幖幟者皆應置之若漫荼羅不作尊形但是祕密印者於金剛座上作蓮華臺臺上如前畫作幖幟其作字漫荼羅者經中有種子字當如法置之如經不載當取梵名中最初字為種子或可通用阿字也北面蓮華部諸尊若經中不說形相者通作紅蓮華色或淨白色如金色尊等則依名辨之所持印相亦如佛部中說然用蓮華為幖幟如蓮華輪像當以四蓮華葉如十字之形用為輪輻輻外作刃環圍之蓮華刀當於蓮華上置刀刀鋒上又用蓮華以為幖幟相金剛杵戟等皆亦如是蓮華羂索以蓮華為兩茸鐸則以蓮華為繫鬘則貫穿蓮華以莊嚴身或於所持華上置之戴塔吉祥於頂髻上置窣堵波或在所持華上蓮華尊即於華上重置蓮華寶德尊蓮華上有寶能授一切願明王能滿一切希願其狀一如觀世音手持蓮華華上或置如意寶隨息災增益降伏事在彼相應壇中大吉祥二手各持蓮華水吉祥或蓮中出水或手垂出水被鹿皮尊當以鹿皮嚴身如梵天像其契印漫荼羅例同前說通用娑字為種子也南面金剛部諸尊亦可依經初所列名者皆具置之隨作方圓三角半月等壇身色亦爾或持一股拔折羅或持三股五股上下二鋒等種種金剛標相如經中所說隨意置之其刀斧鈎鍼等皆以金剛為幖幟刀即刃鋒柄飾皆作金剛杵端銛銳之形羂索連鎖兩端皆如三股拔折羅像輪以十字金剛為輻輞利刃環遶圍之鐸以一股金剛為上繫十字金剛為舌餘皆例推可解契印漫荼羅亦於金剛座上置白蓮華華上各表其物若作字印漫荼羅執金剛所統眷屬通用嚩字為種子餘金剛通用𤙖字為種子也第二院諸菩薩眾若經中具載形相者一一如本教畫之無文者通用真陀摩尼印當持蓮華華上置如意寶周帀焰鬘圍之或隨彼名中義趣以表其相如寶冠菩薩即於華上置寶冠寶網菩薩則於華上置寶寶掌則於掌中持寶發心轉法輪菩薩即手中持輪所有諸闕位處皆置賢劫菩薩其使者奉教等皆作卑下之容其使者操持刀棓狀如夾門守禦奉教者或捧持畫印或瞻仰所尊若受指麾教勅守護者則如守門通信有所諮白各隨其類也降閻摩尊是文殊眷屬具大威勢其身六面六臂六足水牛為座面有三目色如玄雲作極忿怒之狀六面尊形相大同然有四臂六足或二手二足當撿文殊梵本具足圖之凡此等諸尊若餘經中具說形相者亦可依彼圖畫入漫荼羅中其有此諸尊毗盧遮那經不載真言手印別出餘經者當依彼經授與真言手印令依此經供養次第法行之也若第三院十方佛等各依常相圖之若作契印當以如來頂相種字則以阿字若聲聞緣覺一同比丘儀式是中緣覺小差別者謂或有肉髻等大人相若契印當用鉢袈裟錫杖等其種子字如經中真言所說東方日天之前或置摩利支天女如陀羅尼集中出之北方夜叉八大將圖中闕少者其形大抵相似皆被甲冑持伽䭾印身相圓滿端正以彼趣此所求無乏常快樂自恣故也羊耳馬耳象耳等皆是鳩槃荼眷屬其形不同夜叉皆露身垂毛作非人之像耳同畜獸圖云持明仙者是餘藥力等所成悉地持明仙者皆是專依呪術得悉地人直云諸仙者皆是圍陀事火之類勤修苦行成五通神仙又有夜叉持明是彼類中福德最勝天趣之所攝者與世仙人又殊也其山海河池林樹糓藥城邑道路等神各以本名為幖幟相山神坐山河神坐河其樹藥等或手執持或依其上當以義類推之華嚴中更有足行神身眾神是護諸跛行之類及護身神亦可依次列之西方非人趣者當知毗盧遮那普門身中絓是雜類鬼神傍生等圖中無別名相者多在其中所攝最多也路係多是赤色辟多是黃色訖栗瑟拏是黑色其青色亦是中攝若依此方明義則當各別出之訖嘮是白色皆是一類龍王各依本色畫之若加鄔波字者其色稍淺遜那鄔波遜那亦是護門大龍王皆右手持刀左持羂索主秊月時分神等皆作天女形執持華枝等以為標相若主善事者其華亦令色相圓備若主惡事者則持萎萃華果等其主六時神亦可持六枝之華作隨時榮落之像以表其事主晝夜者亦可以華敷華合明之他皆倣此南方苾陵吃㗚知是摩醯首羅子身極枯疲以常降伏怨歒假使骨肉消盡要令得勝故為此形私謂即是智度所云常修苦行割肉祀火感生諸惡神者所以位在南方其十二火天經中略說形像有一神闕名者但依諸火天總相之形餘如圖中所示也
