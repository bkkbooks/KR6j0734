body:
  text: 沙門一行述記轉字輪漫荼羅行品第八之餘爾時毗盧遮那佛復次決定説此大悲胎藏生漫荼羅王敷置諸本尊位定三昧神通真言行不思議法説者如前已廣説敷置漫荼羅位今何以更説此有多義欲更開發一類衆生故令前已聽聞者倍得明了故前雖説諸位地然尚未普周遍今更説令無所闕乏故又前但説其名猶多未顯形狀今更説令具足故何故不併説之而更分拆於此處説耶此亦有意乃至深樂法者猶不頓為説之欲令發起珍重之心漸漸開導也復次若但以圖畫尊容用為真實者如彼畫師等亦可成就阿闍梨功德然不但以圖畫故而得成彼真言之行當須一一與三昧神通相應方名不思議行今佛欲開顯之故云三昧等説法也謂與三昧神通相應而敷之也彼阿闍梨一切智門阿字住取線禮一切佛者如次上已説心中作阿字及眼作囉字等前品已具説今欲作壇先須住此三昧令與理相應以相應之智而運布規墨也凡合繩當令得所不得太慢若不調者令師及弟子多病為障所嬈若用時斷絶亦令師致損耗也次當知方所者所以先須宷定方面者若弟子臨時錯誤或謂東為西等即為障者之所得便也次禮一切佛者即是禮於阿字真言之體也此處拼壇準經疑疏説左宜審問師禮已在壇巽地北向弟子艮方南向引繩相對次師引繩轉向乾維東向弟子回身西向次弟子右回至坤維北向師回身南向次師又右回還至巽地西向弟子回身東向即四方位定也弟子次更至乾維向巽與師相對即定乾巽隅竟云云更問凡定四方必須如前審諦不得移易若定四隅及中心十字界者但令逐便右轉不令妨礙即得也如是作已阿引闍引梨復於瑜伽中轉心中阿字而作嚩字如前布置囉字等方便不異於前但改心中阿字即成金剛薩埵身也亦須觀想己身即同彼身執持如來智印也雖改阿為嚩然亦不相離何以故由不生故即是本來無有繫縛體一門異也如上引繩猶未至地拼之即作此觀即與弟子更入中胎之中還如上引繩準前次第於中胎定方所也如上無二相應形如來形空性形者轉相釋也歎此無二形即是如來形如來形者即是性空形也如上所説前引線當心師及弟子相對引定四方及四角十字道但以繩印持而未下也先已作標相在四角置了方作也當如此定時須如上想於阿字而遍其身皆如上説也然大日如來入大悲胎藏生三昧此大悲胎藏三昧豈與前品大悲胎藏漫荼羅有異耶正為前壇諸方未滿色像亦復未具故更説也次定方竟師想嚩字如上説遍於身分想自身同執金剛之形入於中胎如前引線定方所遍即下方絣之更問先定了方下絣耶為直爾下絣假令中胎方六尺者量半為三尺即是胎分第一院廣狹量也分此三尺以為四重即有三線道也第一為行道第二為置供物處第三重是諸尊坐處第四是外緣其三重皆等外緣狹也計此三尺內均調令得所也當供養時師當運心一切應來會此然無圖位座者皆於此外緣中供養也次析第二院三尺取半為一尺五寸第三院量亦於中均布四道如上也次更析一尺五寸取半當七尺五分為外院量也亦於此七寸半內均置四道令得所也第一院胎外門口即與行道處相連當取少許用立門位餘通行處門此門位其三重外門若有寬地任意大作多侵地無妨也前漫荼羅中云第二院置釋迦第三文殊師利菩薩此文互也由先定中胎竟直向第三院定之故云第二非是第二第三重也今此中自有誠文文殊在第二重釋迦在第三重也想阿字定外院次想嚩字而作中胎次第作之第二院想文殊或想瞞字亦如前遍身分等次第三院當想釋迦或想作婆字也重聲婆字也次金剛有情金剛執我加持者彼印或嚩字或於內入中胎漫荼羅置之者謂師先定線道竟欲入中胎時即自加持作金剛手也然師以用字作己身即同毗盧遮那之佛不應自有所作務故轉作執金剛菩薩之身以阿字本不生與字不相離故得轉用也如是第二漫荼羅亦本寂我加持力故無二相應形佛形空性形者次復歎嚩字之德以阿字義入中故亦復本寂也即是本不生義也無二相應者嚩即阿字無二無二分理常相應也以本寂之故如來之形亦空無自性也次二分天位捨外漫荼羅三分遠界道棄捨東向線申等者謂每一院皆有三重捨第一重第二重於第三院安神位也次捨第二院於第三院下色也義猶未了更問經中從定線位訖竟至定色以來解未明了未記更問之經云復次毗盧遮那我加持彼印廣法界尋念彩色下者謂下綵色時阿闍梨當想毗盧遮那如來或彼印此印即是廣大法界之印也爾時當想自身即是大日如來如是想已先下白色爾時阿闍梨自想其身即是法界法界之體明白無染也如是想念時非直我身如是一切有情亦復如是淨除同如來亦一切過離者自身等如來謂白色也白是法界體離一切過也然所云一切有情皆同妙法界者當以何法得之然此非無方便也謂入囉字門入此字時即能令己身及弟子乃至一切衆生究竟皆等如來法界身永離諸過也故次云想囉字其字色白如車璩或云如商佉即是寶具也其色潔白第一師云此中即有阿字有嚩字也故囉字白色想字焰光寂然光出如乳以之淨之成無垢色離一切過也及君禰華是西方華也亦鮮白無比或如皓月之狀其字之焰亦白寂然恬寂而曜光明如是想時又誦囉字至百遍或千遍方下色也阿利荼也凡加持色法先於色中想囉字字成已即轉為佛也此有二種阿利荼謂定手當胸上為拳而申風指直豎右臂如擊物直申舉之其左腳向前右腳相去三尺以來長引即是也白朱黃青皆用之當想佛形而作此印也凡作印有二種威儀若立作印皆須作威儀也四佛皆作寂然之形用此印也第二下赤色應記之者言阿闍梨當審諦也次下赤色時當想麼字或作囉字阿字此字照明如日初出之色或赤或黃此即赤黃雜也此光明照赫奕此字即是寶幢佛種子字也此是無能降伏最勝無比之佛也兼想自身即同此佛餘方便準前赤色囉字安點加之不合是阿字也義合用囉字加點耳次下黃色時當想迦字作真金色其焰亦然是金色牟尼佛也牟尼是佛都號也迦是作義業義以無作故永離諸過住此三昧害諸毒光明一切遍也當入定依教者用意諦觀不散亂意也次下青色時當想麼字彼上思惟麼字謂於青色上想之也即是度生死義釋迦牟尼也此佛坐於大菩提座一切佛用此字除衆生恐怖也而降諸魔軍衆也其字如虹之外輪有青蓮之色其光亦爾也餘方便如前西方名虹為帝釋宮也次下黑色想訶字如劫災大火之時以火極盛故作紫黑之光此字光亦復如是也此是阿閦如來其佛以大慈悲為護一切伏諸障故作毗俱胝怒形兼作印擬於作障之者此俱胝皺眉如前説也此尊名鉢羅底丁也反哩荼梵字也此印舉左手申左腳屈右腳也此是降伏通用印也作金剛忿怒形不須作佛形也此二尊是通一切用身印也餘方便如前爾時毗盧遮那佛從三昧起住於無量勝三昧當於定中一切遍無能害力明妃一切如來境界生説者如來前者住於甘露生三昧而説如上法門已了為欲滿足修真言行菩薩諸方便令具足故復從定起更入無量勝三昧無量勝即是無能害力義也由住無量勝三昧故感發生起此明妃也此明妃名一切如來境界生即是佛之境界也諸真言行菩薩由此明故即同如來境界亦生如是不思議境界也由入佛境界故所作功德亦復同於如來也遍一切無能害力者即是無障礙義也非直遍於如來境界亦遍一切聲聞緣覺境界乃至最初發心之者但能修此明妃之行亦即入於如來境界也南謨薩縛怛他竭多者歸命一切如來等也從諸如來生是故非一以非一故故云等也薩嚩目佉弊也二合者一切諸佛以為首望也更問之阿娑弭無等以從一切如來境界生故無等也又祕釋此中阿字即是佛本身三迷是等等同諸佛即是等於阿字體也跛囉弭譯為第一也以無等故即是第一更無過上也祕釋者此鉢字即是第一義諦由上阿字同一切如來體故即是第一義諦與如來等也阿遮梨不動也由阿字故即同第一義諦第一義者即是言語道斷心行寂滅故不可破不可轉也伽伽禰空也由不動故等同虗空性淨廣大不可分別限量也􅋌薩麼二合囉禰者尋念也謂尋念於阿字之義即是於恆恆時於常常時思念此義亦無間絶之義也薩嚩怛囉二合引奴揭底遍至也由常思念如是義故能遍至一切處非直遍至一切佛亦遍一切聲聞緣覺乃至發心等處娑嚩二合引訶引娑嚩二合自也訶是本也更問警覺諸佛令憶本誓願也如來昔立如是決定大願修此真言行者皆當加持建立令速滿所願我今如是修行故警發諸佛常念本所立誓願也次調彩色法佛般若波羅蜜多作禮誦此明妃八遍誦之者謂調彩色將圖如來本真之像先當讀誦大般若經恭敬供養即是作禮義也凡調色時須如是作也又想彼色中字類謂字作羅等誦此字或百遍或千遍也又誦明妃八遍也師調色已從坐起繞已入中於弟子想念大慈悲力師即自作金剛及字印也已從定起繞漫荼羅發大慈悲心即以此大慈悲力加彼弟子已阿闍梨作成事金剛薩埵加持嚩字施願金剛等菩薩之者此阿闍梨以如來加持及阿字故即是毗盧遮那如來以如來自作成事所不應故更以嚩字加持作金剛薩埵身而畫諸像也縛字并施願吉祥金剛者是文殊也種子是麼字即空點也用施嚩為𮢥字耳當作時想同己身如上説之又誦此嚩字百遍或千遍等也畫大悲藏生大漫荼羅內漫荼羅安祥者師如是自加持已安詳而起入於中胎徐徐運布衆綵而作毗盧遮那之像也其像本形坐於白蓮華座上以髮為冠不加綵飾用極細絹為下裙更用極細羅縠輕細於下服者用為上服令肉色相映內現也身作閻浮金色色之深金極光瑩者是也其佛像身皆生光𦦨相合為鬘連環不斷而遍身也所以漫荼羅中須造此佛形者為欲令彼弟子速生勝願及以加持之力成滿一切智身故先須造立也復次造壇有上中下法若弟子財力豐贍堪能廣辦者師即當作畫色像之壇為示本尊身印之相故若力能辦而作字壇即犯於祕法隱覆之罪若觀弟子心極殷重乃至不惜身命尚能捨身而奉於師何況當有所吝然資力不辦者聽作字漫荼羅即於此置佛之處但書作字即是如來之體也置阿字竟中胎之外院直東作字又於東北自在方置字此伽即是虗空眼也是一切佛及菩薩之母也次火方一切佛菩薩真陀摩尼寶印或置迦字也次北方觀自在及彌勒賢劫一生補處菩薩以為眷屬置蘇次或置娑次南方金剛手等或作形或但作印印謂三股拔折羅或作嚩字也又此中置字與前壇方位或不同問之復彼分位三棄捨一切執金剛諸印畫或彼字者多三棄捨亦如前釋不異字印作吽引字次羅剎方西南也毗盧遮那下畫不動尊石上坐手執刀及羂索遍身焰鬘期刻彼一切作障者或但作印於上印謂羂索及刀也或作憾引字耳次於風方西北也作三世勝害一切作障者頭上光焰貌作大忿怒如閻摩羅形黑色於恐怖可畏之中又極令人恐怖當如是作極可畏形也其手中轉拔折羅是三股金剛印也此是定或但作字謂長訶字次於四方畫作四大結護東方作無畏結護是名也身金色白衣面少瞋狀手持棓若但置印者但畫棓印也或但置字嚩字也北方作壞諸怖大護白色右手持刀著白衣并𦦨光若作印者但畫刀形若字者作跛字或傍加二點西方難降伏大護無有能制伏者故以為名也身作無優華色如此間深紫蜀葵華色也衣亦赤然少淺於身色其面微笑在圓光中立作觀大會衆之狀謂西方衆會也印但畫刀若字作索字南方金剛無勝大護猶若金剛更無有勝故以為名也復次金剛是天帝釋別名然此大護勢力又過於彼故名也其身黑色忿怒形皺眉衣亦黑然稍淺於身面之色也頭上但作髮髻自身𦦨光也手持棓若但畫印亦但置棓也字作乞釤二合字為種子也上來四大護皆次并置眷屬眷屬即使者也皆坐白蓮華上持真言者當如是而敷置之也次出外向第三院畫牟尼王釋迦種姓著袈裟衣具足三十二相是一切衆生施無畏者以教法利益一切皆令得無畏故也其印當置鉢袈裟等等謂錫杖之類若字者作婆字此最為勝者謂祕密勝上義也次外漫荼羅法界自性加持菩提心發趣者作法界自性觀也法界即是如來之身觀自身即同一切佛法界身也以此加持住菩提心也此發趣是向義至義修行義更問此一段也彼三分捨三作禮佛毗盧遮那尋念如前調色者謂置釋迦已次第二院當禮毗盧遮那如前調色中方便而畫也更問東方作施願金剛童子形即文殊師利別名也左手執青蓮華華上置金剛以一切瓔珞嚴身上妙細絹以為下裙極微細縠以為上服又令細於下裙身色映現也身作金色頭上有五髻子也彼印但畫青蓮華華上置金剛杵也若作字者謂滿字或加歸命即是真言也文殊右邊即北邊也置光網菩薩一切身分圓滿左手執寶網右手執鈎若但置印者或畫印或畫鈎也種子字者染字也但置此即得也南方畫除一切蓋障菩薩金色髮冠云無瓔珞左手執真陀摩尼寶珠在蓮華上也若但作印者置蓮華上有摩尼珠或但置字者謂惡引字也北方作地藏菩薩色如鉢孕瞿華色西方有此華如此間粟穀之色華房亦如穀穗甚香也此菩薩手執蓮華以諸瓔珞莊嚴其身若但作印者但置蓮華也若置字者作伊字也西方虗空藏菩薩等亦以諸瓔珞莊嚴其身身作白色著白衣其白衣色映身作肉紅與身色少異也身有光焰執大刀彼印者但畫大刀也若但置字者作伊引字也然此壇中所少位次尚多即云造了者亦是上下互現也造了時阿闍梨先在門外坐住法界梵本云次持誦者住法界我即法界性住菩提心也兼菩提心此菩提心即是法界性也向東方而作金剛印壇門向西開故師面向東也造壇了當壇面向東坐想同於佛佛即是法界體也既同諸佛然後作度人事業也作事金剛謂作諸事金剛即是三股拔折羅也凡言作金剛者字身印皆具作之作佛亦爾恐煩不廣一一言也次供養作殷勤者更誡行人應誡慎作之勿忘次第也梵本云當結金剛印次作金剛事業殷勤而供養現一切佛救世者三昧耶又現印三昧耶等者三昧耶印衆多故云等也供養及作事等皆作三昧耶誦三遍作事多用處故云等也由作此法即以此隨所作心能遍一切方所驚覺一切如來由佛本願故即皆驚覺而作加持也先念遍一切方所謂漫荼羅中隨方面一切諸尊運心普遍若深行者即是漫荼羅諸尊悉地方示三昧耶也請諸尊法用二種使者成辦諸事真言即得也若具捷疾慧一一用本真言印別請亦得次外喚弟子令彼護淨者弟子先在門外喚之令近門向壇立又當先教彼如法潔淨也此即請本尊了次結界乃至發遣皆在供養法中準用即得也既結護已為授三歸此三歸謂印法也初印護身次法輪印護諸身分次更有一印下當説之初印印頂次印印支分次印更問次印上云金剛有情也由此三印故即是住菩提心也作法界法輪印時彼當一心作自體者謂行者運心作此法界時即觀自身同於法界也結印時同彼印自體也上法界自性印結之彼法輪次結更問先想弟子髻中有阿字然後以法界生印印之以印案之次誦真言三遍或七遍也次當以衣帛覆其面師當發大悲心而愍念之為令彼永度生死開佛知見故其弟子爾時亦當自發殊勝無上願也不空手作菩提圓滿故謂彼弟子欲令無上菩提速圓滿故隨上中下力分盡其所有供養諸佛本尊等或持寶華等而獻之也時師欲令弟子結護故耳語教之所謂令住菩提之心別有説處也彼既發菩提心一心誠仰而住師自作印向其頂上著之更問何印然後令擲華當記彼華墮在何尊之處然就一處本尊之身又有上中下左右之殊隨彼所墮之處而授彼相應印真言也弟子法教如是作三昧耶故一切與更問爾時執金剛具德又復問此佛灌頂法願佛自説者請佛自説也時佛住法界性中告金剛手諦聽一心我説此法令修行者於此法中自在能得所謂令得勝上教法也此自在者亦是速得義又是攝持義與上所云多財名自在義不同也我説一切諸法教所謂最上自在攝持者謂心有願求悉能攝取自在滿願如於一國自在所為必成也阿闍梨如來本形意加持作彼印者隨彼上中下法或作如來形或蓮華金剛部等隨彼所主之壇而作彼形而為灌頂也如來本形加持謂阿闍梨以如來性加持自身如來性即本形也或用彼印謂以印加持想自身以阿字遍支分此阿字即是法界之體性也由此莊嚴故即同佛身方喚弟子也若是得定阿闍梨或已得法驗者所作任運能成若不能如是者當用印及想而作也次引弟子將向大華王漫荼羅謂壇外先作灌頂壇處也四寶作大菩薩加持大瓶者是中胎四大菩薩所加持瓶也以菩薩寶而用莊嚴也次當作生一切支分印而於弟子頂上灌之凡灌頂時作此印結已取瓶為灌也若不以此印者則法式不具令彼弟子不能住菩提心則有退轉與空灑香水無殊也又復未灌頂前於弟子頂十字縫上想作字其心中極想作阿字又想囉字在於胸上亦可但想阿字遍一切處用也金色光髮冠坐白蓮華者謂想彼弟子心中白蓮華開敷圓滿毗盧遮那如來坐於其上然後灌之經云仁者即是毗盧遮那如來也若以此法而灌頂者即是同於十方諸佛灌頂以法水而受法王位也不爾者徒自勞形灌之而已無所能為也經卷第三竟密印品第九經卷第四爾時毗盧遮那佛觀察諸大衆會者佛已略説灌頂儀法了將欲更有所説故佛復觀察十佛土微塵等大會非無因緣謂將説如來身密之印也次即告金剛手有印名為如來莊嚴具同法界趣標幟同者言一切佛以此為莊嚴故得成如來法界之身若有衆生行此法者以印加持故亦同如來法界身也又此印者即是法界之標幟以此印故標示法界之體即名法界幢也諸佛由此嚴身故於一切大會中建此無上大菩提標幟能令八部等衆惡邪者遠而去之善根性者親近奉教修行也汝可諦聽極善作意吾今將宣説之也世尊今正是時世尊今正是時者願佛此兩語有意也初説迦羅之時意言今此四衆無有支葉純是貞實堪受大法如來應機而説正是其時也次三摩耶之時即時分之時今正是説法時也爾時世尊住於身無害身力三昧者佛為滿斯願故復入三昧此即如來無礙之身自在之力故無能害也住此三昧而發三明真言其明名為無害無等力也由此三昧耶故諸學者得聽聞得入正法若不作者即不合入壇亦不合聽祕教也若修此明即能得身淨語淨所願滿足會於三身故名為三明也三力者謂三世力或是三平等力也無等力者即此三力也其明次當説之耳南麼三曼多佛陀引南引歸命一切佛阿娑迷無等也怛哩三迷三等也三摩曳即三昧耶也娑嚩二合引訶引驚覺發也阿娑迷者此中即以阿字為首即同諸佛法身無相離相當知此法身即是無與等比也三等者謂諸佛三身謂法報化合為一身教化衆生也亦體同阿字之門無相離相故言等也三摩耶者是不可越義是無等三世諸如來之所同説也佛住三昧説此明無害無等力由此明故能入三昧耶此三昧耶即是誓願猶如於敕是三世佛本所要誓也此法門難信難入難得聽聞由法不具故也以是故三世佛同説此真言如此三昧耶真言加持故得入聽聞修行此法也如尊之教不可違越若不聞者即不得入亦不得聽聞也娑嚩二合引訶引是驚發義以此真言驚發諸佛説此明時諸佛即驚發而起加持行人也此明力故能滿諸地能令修者得現三法謂成就有三法謂本尊之身真言及印等此三法具即得成就也次説手印之相不越三法道界者此界是結大界之界非馱都也於界道當中而行故名不越耳今此中先説十二種合掌名相凡諸印法此十二種極致敬要宜明記之第一合掌合掌中心堅相著十指頭相離少許開之此名寧上尾拏上合掌此名堅實心合掌也第二次以十指爪相當齊等以指頭相合掌中心小不相著名三補吒合掌此名虗心合掌第三又次以十指頭相合指亦齊等然掌內空令稍穹隆名屈滿囉合掌此云如未開蓮也第四次以二地指二空指相著餘指稍令開張名僕拏奴開反合掌此名初割之蓮也第五次又以兩掌仰而相並令俱向上正相並鋪之名嗢哆那上惹合掌此云顯露也第六次又並仰兩掌與前相似而令諸指相就稍屈合之如人掬水之狀勿令太屈也此名阿陀囉合掌此云持水也第七次又令十指頭相叉皆以右手指加於左手指上如金剛合掌也此云歸命合掌梵名鉢羅二合拏上摩合掌第八次又以右手加左反掌以十指頭相絞亦以右手指加於左手指上名微鉢哩哆合掌此云反叉合掌也第九次又以右手仰在左手上以左手覆在右手下稍似坐禪人手相加之形此梵名毗鉢哩曳薩哆合掌此云反背互相著合掌第十次但仰二手掌合二手中指頭相接而仰之梵名啼上哩曳入合掌此名橫柱指合掌第十一次又俱覆二掌亦以二手中指相接梵名阿馱囉合掌此云覆手向下合掌第十二次又雙覆兩手以二大指並而相接十指頭向外亦同名也又梵名阿馱囕此亦云覆手合掌也今此三摩耶印先合三補吒掌先豎二手相遠漸近令相著又合掌內稍空者是也以二空指並而直豎之勿令太低勿太傍側正令二空指向上也此經中二手皆立定慧祕名十指皆稱五輪密號其五指中小指名地無名指為水中指為火頭指為風大指為空左手為定右手為慧亦可左手小指為檀度以次向上數之頭指為定右手小指為慧度以次向上數之頭指為智度若依瑜伽定慧二手與此不殊十指以十波羅蜜為號從定小指起檀從右小指起慧次第上即檀戒忍進禪慧方願力智此即十指之名又指為度此上意者所立此名非阿闍梨親授者不可以解故言密也此三昧耶印若初修行作諸善品之時若不先作者不合作諸法也非直作此亦須誦前三昧耶真言作法結此三昧耶印置頂上誦前三昧耶真言一遍置印於右肩次置左肩次置心上次置喉上每置時各誦真言一遍凡誦五遍而印五處便成大護今更略説真言及印然此真言有何功德耶以此真言故能除宿障以淨自身既身淨已外障亦淨以外障淨故諸障皆不得入此即為大護也由此不思議加護故福任運增長罪障自然除滅諸佛驚覺滿其所願也又次法界生真言曰南莫三漫多佛陀引南引達磨馱都法界也􅁤薩嚩婆引嚩性也俱引唅我也達磨馱都是法界也法界者即是佛身下句云我者言我即是法界也又此行者雖未能即體真性但作此印而誦真言亦即體同法界也其印以屈二空指內掌中以左右手地水火三指厭二空而作拳豎二風指令直兩手各別作拳而豎風指並也先豎二風指令當胸即向裏而轉即於頂上作以風指頭拄令兩頭指從頂兩邊各近左右頰頸而向裏稍下曳之至心即散手也謂初豎指稍令指頭向下指背向裏近頭頸頰漸漸指頭近下也凡誦真言作印喻如耕牛二牛同進不得前後也次更作轉法輪印者先作反背手合掌以二地指反相勾令右加左上也餘水火風三指以次亦反相勾訖末後綟二空指令至掌向內相拄也此是轉法輪印由作此印故令彼身心俱淨能現見十方佛轉法輪也真言曰南莫三漫多佛陀喃引伐析囉引金剛怛摩二合俱唅此真言上已釋之更勘次作刀印者刀喻利智以能除斷為義謂除惡見山峯也如大山之峯撩亂甚多煩惱亦爾今作此刀印由此印故能斷害身見及俱生見也其作契印法先當歸命合掌如上説也即屈二風指令指頭相對以二空指並而壓捻之令如大刀之形即是也其真言曰南莫三曼多佛陀引喃引如上摩訶竭􅖱伽刀尾羅惹無垢達磨法珊捺囉奢現迦娑訶惹俱生薩得迦二合身見野捺哩二合瑟恥二合制吒曳切諾入迦截斷怛他引蘖多如來地目吃底丁以切二合信解你入􅗭佐多尾囉引誐無貪達磨法你入􅗭惹多生吽大力無垢法現俱生身見截斷如來信解生無貪法生此真言梵音誦之在經本中此已注義竟如上説也此真言以初麼字為心是我義又是五空點字即是遍一切處義也今此中意正欲害此我見也當知此刀即是諸佛如來大智能斷絶諸見故以刀截煩惱根即得無垢法現也謂身見俱生之類即是垢也今斷是垢竟即休息邪然未休息更有勝法謂除是垢已當生如來信解此義如最初解如來信解謂是何法謂無貪等善根也由此故次生字是中訶字為因為除是因故傍有長阿引之點即是一切法本不生故也下有塢引字為三昧上有點為大空誦此者能令行者滿三種身以此字中有三義即是法身現也三藏云西方尤祕印法作時又極恭敬要在尊室之中及空淨清潔之處當澡浴嚴身若不能一一浴者必須洗淨嗽盥以塗香塗手方得作也又作時須正威儀跏趺等坐不爾得罪令法又不得速成耳次作吉祥商佉印先作空中合掌如上説屈二空指以二風指壓之令如商佉形作印已即近口吹之如吹螺之法也此是滿一切願吉祥法螺印由作此故即得滿一切善願宣説大法能令十方普得聞知此即是寂靜涅槃印也其真言歸命同前薩嚩哆引遍一切也暗此是真言之心一切法本來不生上又有點即是大空遍一切處也此是大寂涅槃之體性如萬法寂然遍一切處也次金剛不壞坐印法亦名蓮華坐印先以二空指二地指皆相並餘舒散如微開剖之蓮即前薄疙難合掌也經云令如鐸形也次即改以地及空指相捻中間六指並如舊舒散其中火風指各自相合水指獨單立即是也此是蓮華之座印亦名金剛座也猶坐此座故能生諸佛諸佛皆由此坐即名吉祥座也故名金剛不壞座也真言歸命如前阿去引此是真言之心也此長阿字為行傍二點為三昧為令此法堅固故故復有點也然作拳法有其四種諸結印時皆悉引用第一如常作拳法大指豎之此是一也次以空指在於掌中而拳之名金剛如來拳第二也次叉手而合作拳令十指出現於外此名指在外拳第三也並右指加左上次以十指相叉皆令十指頭在於掌內此名內縛拳第四也亦右指加左上次作金剛印二手相並皆屈水指向掌內以二風指捻火指背而不相合此即金剛印也二空指亦並而豎合如五股形豎也由此金剛印能壞無智之宮一切不能壞也其真言歸命如前真言體但有普遍歸命持金剛者吽引字義如上準説之次佛頂印先作指向內拳即申二中指令相並次以二風指加於中指之背中節而屈二空指並豎微屈頭捻水上即是也其指向內拳即是指頭向內也此大印名佛頂結此印時即同仁者仁者謂一切如來也謂作此印即同諸佛身也吽引吽引此是真言亦是具三解脫義也初為因後為果因是如來之行果即成佛也合加頂上更問次如來毫相印以智手為拳直豎大指置於眉間即是也作此印即同如來毫相具足也其真言歸命如前更問行也因也生也以此不生之行淨一切因也闍謂生不可得也次作如來鉢印左手持兩衣角其法取袈裟近手尖角及搭肩之角繞肘回入手中令二角如雙耳也仍以二手相重令以右加左上如坐禪手引上令當稍屈如重手承鉢之形即是也作此印即同如來持恆沙諸佛標幟之儀亦能令一切非器衆生皆堪為法器也其真言歸命如前婆是有義即三有也以本不生故即離三有三有本來不可得也除此三有而得如來真實之有謂諸佛法身也次作施無畏手印左手如前持衣二角舒而當右手指向上而向外舒之如招物之像如前瑜伽中釋迦印即是也若作此印能除一切衆生種種怖畏憂患即時皆息亦除彼未來種種大可怖畏也其真言歸命如前薩嚩他遍也誓那誓那勝也婆也那奢那上聲是除恐怖也遍是普義即是遍一切處也於一切處方便之中而最為勝皆勝彼也初離異生煩惱次離二乘煩惱故重言之即是勝中又勝也如來以此之故能遍一切處普除一切怖惱也次如來滿願手印左手亦準前持衣角展之如前右手向外舒而下垂五指如瑜伽中寶生佛印也作此印時即以如來力故一切佛滿其所願皆得成就也其真言歸命如前嚩囉馱與也嚩析囉金剛也怛麼二合迦我也亦身也意云願諸佛與我金剛身也亦是授我大智之身也此即是滿其所願耳次怖一切為障者印以右手為拳握大指也而舒風指直豎之當以此印跓於眉間以指頭當眉間也云等引者謂作𧿥俱知形其面如忿怒而心住一境不動也此一切佛大印能現如來威猛大勢之力恐怖一切為障難者令其降伏亦能與一切衆生所願行者結此印時為障者莫不四向馳散乃至大力天魔軍衆亦自然退散如來菩提道場以此印能伏諸魔也真言歸命如前摩訶嚩梨大力伐底捺奢嚩梨十力也馱婆二合吠得也摩訶彌底𭌆也大慈也毗庾二合娜蘖二合帝發也此真言諸佛大力也此大力是何等力耶即是如來十力以一切力中最在大也如來云何得此十力謂從大慈而得此十力故言此十力從大慈發生也次佛眼印慧手以空指厭風地二指其指屈之空指捻其甲上也而申水火二指用右手作之作已用此二指拄於其眼先加右眼次加左眼以此祕密方便能淨眼根成就佛眼得見如來深密境界也其真言歸命如前伽伽那空也嚩囉願也羅剎拏願相也迦嚧拏悲也摩也體也怛他揭多如來也作屈數二合眼也夫虗空雖無相無礙而不能成辦大事今此如來之空雖無所依而成一切勝上之事過彼虗空不可為匹也大悲體者即是如來之眼此眼從大悲生能生大悲也更問次如來羂索印先作十指向內之拳即舒二風指指端相拄屈而相接圓環之狀其二空指亦以右厭左雙內掌中即是也此印能縛一切為惡者亦能壞彼令其除息諸惡也其真言歸命如前係係此中有訶聲即是因也兼有三昧義此係是呼召聲也謂呼此成佛之因也此因以本不生故離因果相令此因淨而復淨也摩訶鉢奢即大索也即此離相之因是名大索也鉢羅娑盧普也馱哩耶如空也言此大索廣普如空無所不遍也薩埵馱都言此索普廣作何事耶謂於有情界中而攝持之除其癡故也費慕訶迦癡也除破癡也怛他揭多如來提穆訖底二合涅惹多信解生也亦是發諸佛本願也諸佛行菩薩道時立大要誓盡度一切衆生今以此因要當成果若住解脫之樂不憶本事即違本願此亦名癡今此令除此癡使究於佛果恆作佛事也又此索者從何而生謂從如來信解中生信解義如經卷初已説如來以此信解之力普門示現種種類形或作大忿怒事或為持明之仙具大力勢折伏攝受無量衆生咸令獲於如來妙果即是大索廣普周有情界義也次作如來鈎印先以左手空指厭餘四指之頭令如環狀次以右手三指內於環中右手大指加左大指之外而屈入掌中捻右手三指亦令如環狀舒右手風指而稍屈第三節令如鈎形即是也此説與經不同今疑疏主誤説也據經云此如來鈎印以定慧二手內叉合為拳直豎慧風輪稍屈令如鈎形即是梵經亦如是説與疏不同此宜再問取定作此鈎印能召十方一切諸佛菩薩皆令集會道場亦能滿足十地之位況餘八部之類未生善心者而不來至耶惡引入行也薩嚩怛邏二合一切所害鉢囉底訶帝一切所害也怛他揭多引如來句加三昧聲俱捨鈎也菩提拶􅝩哩也二合菩提行也跛哩布羅迦滿足也此中行者謂由此行能招諸佛大功德海也如世間鈎則有處所分齊不能遍一切處而作鈎召今如來鈎則不如是普及一切無所不加乃至能招大菩提果以要言之悉滿一切如來功德普召一切衆生亦令得此道也故次句云遍一切害害即是鈎取殘之也遍害一切不調伏者皆令於菩提之行而趣妙果而得滿足也次如來心印作前鈎印更豎慧火輪亦屈如鈎定手風火二輪雙屈入掌即是也法皆準前唯加舒火指此所舒二指皆屈第三節是也真言歸命如前枳讓上怒智也納婆嚩生也即是諸佛之智此智不從他得還從佛心生也次如來印亦準於前加舒水指圖不同更勘凡舒三指亦屈第三節也慧手也今此印亦與經差互不同疏主言舒三輪經唯申慧水餘並內叉梵經亦同此説宜再審之真言歸命如上阿沒㗚二合都納婆二合嚩甘露生也甘露者智之別名能除身心熱惱得而服之不老不死可以喻於如來之智也今以此智除一切衆生熱惱令得常壽之身此甘露味亦從佛心生也次如來腰印亦準前如來鈎作之內風指而舒慧水指為異耳此水指直申不須屈第三節也是右手此印經疏及圖互皆差別經言直舒水輪餘亦豎之疏説餘並內叉唯中慧水圖即二水合豎餘皆內縛今此三本不同宜問傳大法人方知定趣水指也真言歸命如前怛揭他多如來也鉢羅蘇婆嚩生也當知此智印即是從如來生也凡印真言皆自呼其義耳一一略具他皆倣此次如來藏印先作三補吒合掌空心也水風二指皆屈入掌中令指相對當其二手火指直申而令指頭相合二空指並而厭於二風指二手地指亦舒勿令指頭相到而稍屈之皆令曲即是也此印亦經疏有異經云屈二風指入於內二空押之二火申合二地二水皆令少屈是也圖與經同囉是無垢義上點即大空三昧也第一字除凡夫二乘障第二字住於如來甘露之空也次二字傍加二點是淨除義第一字除凡夫垢第二字除二乘垢也次結大界印準前如來鈎印法但二手各舉水指令直豎即是也更問之不分明若依此疏説作印不成經圖二本亦皆差別經即屈二風輪二空押之二火直申相合二地二水皆令散豎圖即風火依經二空並舉不押風輪二地二水指頭皆豎合此之三説未知孰是此中大界義者謂從初發大菩提心乃至成佛於其中間不令間斷不沒生死不退菩提即是大界義也真言歸命如前隸離相三昧嚕重攞字作二乘相也補第一義也第一義不可得也哩離垢也微離縛也矩音作也隸離相也此七皆是三昧如來以此諸三昧而為莊嚴更無過上此是諸佛大界也次作大護印準前如來藏印申二水指令指頭相拄如峯其二火指頭亦相拄而稍屈微如連環之狀又開二空指相去二寸已下即是也此印經與疏及圖互皆不同經云屈二風甲相對二空並押屈二火頭相拄令圓二地二水皆散舒是也圖與經大同唯析開二空輪散豎有異也真言曰薩嚩他怛揭帝歸命一切如來等也薩嚩婆也微上蘖帝能除一切怖障等也亦是歎佛歸命也毗溼嚩目契種種門也亦是巧妙之義諸佛巧現種種功德門也薩羅嚩二合他遍也謂一切時一切處一切方所也唅欠訶是因義欠是空義也點又是空以此空淨一切因又復空者此空亦空也囉乞叉擁護也非但護於二乘亦護一切諸佛諸佛由此故不捨有情常作佛事無有休息不住寂滅也麼訶麼大力也即是如來十種智力也薩嚩怛他揭多如來也奔眤也二合寧囉社引帝生也言此力從如來功德生也吽引𤙖引第一恐怖除其障也第二為令滿佛之三德故重言謂極怖之也怛囉吒怛囉吒攝伏也攝伏內外障又為成佛法身故重言之阿鉢囉二合帝訶帝是無害也無障義也此名無堪忍大護由彼威光猛盛如初生小兒不堪視烈日之光此亦如是一切不能堪忍而敢映奪之者故名無能堪忍大護以此護真言行者也次如來普光印二空指並而屈入掌中二風指直豎各不相著皆直豎之二火指頭相合稍闊其節如劒鋒形餘指同前即是也此印與經不同二手火風空等大同地水二輪經文有異經二水搩豎頭相離二地合豎是也圖與經同真言曰歸命如前闍嚩囉闍生也嚩縛也羅相也光也側有阿點與不生義同無相不生也云光也麼履你麼是我也有長阿聲履是相也你是想義即觀也離有觀無觀也怛多揭多囉上此是如來光也如來光以無相無觀等中生之也次如來甲印作三補吒合掌以二風指傍置中指背上而並列之是也其真言曰南訶三曼多勃馱喃鉢囉二合旃茶嚩折囉二合金剛也入嚩二合囉微溼二合普上囉吽已上真言勘得新著是其三義如上餘問和上如一生補處菩薩要被此無上菩提甲坐金剛座降一切魔軍成正覺以此故真言行者要被此甲作佛事也此如來甲真言及如來舌印先譯諸漢經及疏中闕後無畏三藏和上於梵本及圖中勘得也次如來舌印以作三補吒合掌二水二風輪屈入掌中甲相背開掌以二空各附二風側是如來舌印如前甲印空指押水指頭餘依舊舌印闕之勘本如來舌真言曰歸命如前怛他揭多來如誓訶嚩二合舌也薩𭘬諦也達磨法也補囉帝瑟耻多住也如來者即是如實也猶如來舌常作如語不誑語不異語以如是真實故常住也次如來語門印語門謂口也亦準前印先作三補吒合掌即以水指風指頭聚合於掌內以二空指並壓之其二地指二火指並直而頭相並尖如峯形即是也圖與疏異圖言亦作三補吒手稍開掌二風微屈頭相拄二空各附二風下即是也真言歸命如前摩訶嚩迦怛囉三合此是語也微溼嚩枳若那種種巧智也摩訶馱耶大廣也謂此語從如來無量門巧慧而生此智廣大無量也次如來牙印作三補吒合掌屈二風指入於掌內令指節背相並是也真言歸命如前怛他揭多能去瑟吒囉三合如來牙也囉薩囉娑味也昧中之味故重言之即如來法味也揭囉此字與前句相連前句末有阿聲與此相連也是勝上之義即勝上之味也三鉢囉博迦得也薩嚩一切怛他揭多如來毗奢上也境界三婆嚩生也謂此勝上之味從如來境界生也次如來四辨説印作三補吒合掌以二風指勾曲當二火指背上頭勿相著即是也如來由此印故處衆無畏為人演説正法乃至於一字中含無窮義此辨才不可窮盡也真言歸命如前阿軫𭘬二合不思議也阿娜步二合多奇特曷魯婆語之分段也此亦奇特也嚩迦三曼哆普至也佛以一音演説法普至一切衆生之前其所至處各各自謂佛同我音為我説法也鉢囉二合跛多二合毗輸上陀清淨也薩縛二合囉言音也由所發言音離一切語業粗惡等過也微妙清淨令人樂聞故云清淨言音次如來十力印屈地指空指在掌中令頭聚合相拄餘指作三補吒合掌是也真言歸命如前達囉吽吽是三德也麼是空也點是三昧也闍是生義也又招召也更問謂招此印能持如來十力也此三字合在句後如梵本中也馱入舍嚩蘭伽輕十力身分也其蘭字以上是十力即此蘭字有長阿聲與伽相連是身分也陀羅持也即是由此智印之力能持如來十力支分也次如來念處印作三補吒合掌此合掌皆如未割之蓮極空中合掌也更撿前文勿令錯也以二空二風并二地輪聚相捻即是也其捻法當令四箇指甲相到耳當令六指頭相到疏本只言四指不言二地真言歸命如前怛他揭多悉密㗚三合底丁以反念也如來念也薩埵係多衆生利益也弊庚二合馱揭二合多生也起也伽伽那三麼虗空等生也阿三麼無等也言此念與虗空等不可限量然又虗空不得為比故復云無等也所以然者虗空無所有性不能為一切衆生作大利益然此如來念處能為法界有情大作佛事故不可為喻也次一切法平等開悟印作三補吒合掌以二水二空指聚而相捻即是也三補吒合掌以二地二水屈入掌以二空捻之二風加火上即是與疏不同問傳法者真言歸命如前薩嚩達磨三曼多一切法平等也鉢羅補多至也得也得至一切法平等也怛他揭多如來也正義謂如去也奴揭多隨也如也謂隨如來也同彼得如是開悟也次如意摩尼普賢印所以名普賢者以此菩薩所有三業普皆賢善諸佛菩薩之所敬歎故也其印作三補吒以二風指轉加二火指之背後當節令圓是也餘如常疏説有乖疑錯更勘真言歸命如前三曼多奴揭多平等至也吠囉闍無垢也無塵也達摩涅闍多法生也言此無垢從法而生也摩訶摩訶此義重言猶如言天中之天也諸菩薩等供養於佛佛轉供養普賢猶普賢身與三世佛等故此即大中之大供養中供養也故重言也次慈氏菩薩印作三補吒合掌而屈二風指令指頭至火指根下二空指並而壓之餘如常此印如窣覩波形者以持一切如來法身塔故猶如觀音持佛身也真言歸命如前阿誓擔古云阿逸多此呼其名也其義謂無勝也一切愛見煩惱乃至二乘等無有勝之也社耶得勝也於無勝中而得其勝也薩嚩薩埵一切衆生也阿世耶性也奴揭多知也起也起即是知義也謂知一切衆生性也每字阿闍梨云此是彌勒種子字也次虗空藏印虗心合掌以二空指並屈入於掌中是也虗心合掌以二風加二火背二空入掌是也與疏不同疑更勘真言歸命如前阿迦奢空也三曼多等也等於虗空也奴揭多得也前云知義超義此中云至得義亦相會也髀質哆㘕二合麼嚩二合此嚩即是點以加多囉二合字之上即為多藍也囉髀質多是種種義麼嚩囉是衣義馱囉著也謂著種種衣也如虗空無色而能現種種形此菩薩亦爾猶如虗空而能滿種種願利益衆生也次除蓋障菩薩印三補吒合掌以地水指皆屈入掌中餘如常其地水指合三補吒合掌以地水空等輪皆屈入掌中風火合豎是也疏本不同甲相拄是也真言歸命如前阿薩埵係多阿是能除義係多是利益義謂利益衆生也驃也二合嗢此嗢字已入前句長聲揭二合多是除義亦是開發其善性令顯現也怛囕二合怛囕二合囕囕如上所謂除者除其何事謂除四垢也愛見垢一也聲聞垢二也緣覺垢三也菩薩垢四也除衆生垢故入聲聞位除聲聞垢故入緣覺位乃至除菩薩垢故入清淨位也次觀音印初作開剖蓮合掌以二空指二地指聚而相捻餘六指散豎之其火風指皆並豎頭散向外二水指獨立即是也真言薩嚩怛多揭多一切如來阿嚩盧羯多觀也謂如來之觀也迦盧拏悲也末耶體也言以大悲為體也身心內外純以大悲為身也囉囉囉三垢也吽闍此吽字謂行解脫大悲空為三也闍是生義謂從緣生法也此中如來觀者言此菩薩雖未成佛而現等同於佛由見蘊性故得觀名也唯以空悲為體此悲空從離三毒得無貪等善根而生成三解脫也故有三囉字也次大勢至印作三補吒合掌屈十指相拄令周圓如未剖之蓮也此未開蓮即是如來寶篋猶開敷已而却合故也真言瞻字是生也娑是等智也更問離世間生又超菩薩生住平等智中也次多羅菩薩印先作指向內相叉為拳合掌即豎二風指頭相合如針鋒二空指並豎厭之即是也真言曰多呼彼也多利尼上聲渡也猶如渡人於大河置於彼岸上也迦嚧拏悲也嗢納婆嚩此嗢字是拏字餘聲也此句生也由此菩薩從悲而生亦渡衆生到於悲處也次毗俱胝印如前印向內作拳合掌其二風指亦並豎之但參差相厭令右指厭左即是也其形勢大同多羅但參差指為殊耳真言曰薩嚩婆也一切恐怖也怛囉薩你亦是恐怖也於一切恐怖之中又以恐怖而恐怖之令彼退散也如是不調伏者又以剛強威勢而降伏之令不得為非也吽三義如上泮吒也是散壞義令彼諸怖退散也此真言毗俱胝持誦母者於諸持誦之中猶如於母功能最尊也次白處尊菩薩印雙屈二水指入掌其二空指亦並而屈之令相到餘作三補吒合掌真言怛他揭多肥灑耶如來境界也三婆嚩生也言從如來境界生也鉢曇摩二合摩哩尼鬘也嚴身具也此即能生諸佛之功德以為莊嚴莊嚴法身也次馬頭印作三補吒屈二風指合甲去空指根下挾一麥許不相著其二空指並豎稍仰其甲頭是也真言佉馱耶啖也言啖食諸障也畔闍打碎也薩破吒也謂打擊此障令四散也次地藏菩薩印作向內相叉作拳合掌申地水指令頭相合如峯刃也二空指直並而豎之真言訶訶訶離三因也謂聲聞緣覺菩薩之因也凡此中諸真言皆自説本尊之德行此總持地藏菩薩之德也蘇哆奴妙身也由身極清淨故名妙身妙身即法身也瑜伽者住謂行者作如是印也次聖者文殊印先作三補吒以二火指反厭二水指之背二風指屈之與空指頭相捻即是也真言係係此中訶聲因也謂離二因即是超度二乘境界也亦是呼召之聲也俱麼囉童子也破壞彼諸魔亦名俱麼羅也毗目底解脫也鉢他悉地多道也言住何處謂住解脫之道也薩末囉薩末囉念念也鉢囉底惹而戰反昔所願也今念昔所願也尊者所願悉度一切衆生令如我無異是故今當憶昔誓故也次光網菩薩印以左手作拳而申風指稍屈第三節令如鈎形空指豎壓火指即是也係係俱末羅釋如前摩耶揭多摩耶幻也揭多知也知一切法如幻也薩嚩婆嚩性也悉體多住也了知諸法皆如幻故即住諸法實性本性中也次無垢光印舒左手一切指皆令稍屈第三節即是也空指亦豎並小指似屈而已真言係呼也俱摩羅如前肥質多羅種種也揭底行也謂種種行也俱摩羅謂本誓願當普門示現垂種種形以種種行而利一切或現童子身或現壯年身或現老年身也摩奴薩末囉憶昔所願也聖者昔於佛前立願此願當憶念之也次計室尼印先以右手作拳而申火風指令並合直豎其空指亦豎而相並也真言係係如前俱摩梨雞童子作女聲呼也亦是文殊三昧也枳娘難奴汗反與願也薩末囉憶昔也補囉底枳娘本願也此意言尊者於文殊處所得勝願本所六百妙願今亦授與我也次塢波繼室尼印先右手作拳而申直火指其大指亦豎之如常大指向外之拳但申中指耳真言頻去呼也馱耶穿也枳娘難智也前句末有阿聲相連即是無智言以妙慧穿此無智達於實相也係呼也俱摩哩雞童女也亦是三昧以女聲而呼名也次地慧幢印先以左手作拳亦是大指在外之拳而申地水二指即是也係呼也薩末囉憶念也枳娘難智也言當憶此智也計都幢也由此妙慧幢故能摧諸魔今當憶念而令我亦爾也次召請印右手作拳以上來五菩薩皆文殊使者也亦是大指在外者而屈風指令圓屈如鈎與空指頭少許不相到即是也真言阿迦哩囇二合耶招召也召請也攝召也皆是鈎來至此之義薩𮢥上俱嚧一切作也一切取與等皆是也謂如尊者文殊所指授之事皆當作之也俱麼薩羅寫指此聖者身也次諸奉教者亦是文殊奉教者與使者少異也先作向內相叉合掌拳而申二風指頭相合而屈第三節二空指亦豎並也真言阿行也傍有點謂示忿怒形也微三昧耶你曳滿願也希有之事無所不成也能令一切希有奇特之事皆得滿足也曳聲即指此尊者也次憍都褐羅菩薩此譯為除疑也或除垢也如大衆人有所疑怪之事不能決了此菩薩即往其所而斷其疑網以能為不請之友常斷一切衆生疑惑故以為名也其印作向內相叉拳合掌申二火指頭相合屈第三節即是也二空指如常在外豎也肥末底無慧也謂所不了知也掣去馱迦截斷也截斷無知令智慧生也亦是斷壞之義也亦是決斷也猶如能斷金剛般若之義也施無畏菩薩印作施無畏手如喻伽中釋迦印也申臂向上令高即是也此印示行五法也地為信水為進火為念風為定空為慧諸佛菩薩以身口説法今此即是表此五根力也真言阿婆演馱馱即是無畏施也以何法施無所畏耶謂住阿字門離一切生尊者所願已遂我等未得願施我及一切衆生也即以前印回掌五輪下埀相並即是與疏不同次除惡趣菩薩印即是如前舒手令掌向上而向上舉之即是真言阿驃婆庾反馱囉拏舉也薩埵馱都衆生界也此義者以一切衆生無始以來以無明故常在三惡趣今聖者已得如是五力願舉之令得清升也所以者何尊者已自能拔出亦當舉一切衆生界也次救護慧菩薩印如前舒手置心前當以掌向身而掩自心也大指稍豎向上耳真言係離因也又呼召警發之義也摩訶摩訶大中之大也尊中之尊也薩末囉念也鉢囉底枳娘本願也本願除一切苦以除苦故名為救護今呼彼名令憶本所願而救護一切也次大慈生菩薩印如前無畏施手而以空風相捻如人持華之狀餘三指豎而向上即是也真言薩嚩自也制都心也特揭二合多生也言此慈從自心生不從他得故名大慈謂從自性清淨心生不從大種心生故名自心生也次悲念菩薩印如前舒手覆掌掩心而屈中指當心而拄之是也真言迦盧拏悲也末盧二合界也更問尼上多念也此意言尊者本願除一切苦也今當憶念也然此菩薩名悲念者意猶未盡其意者言此菩薩繫屬於悲也如人被他執持故不得自在此菩薩身心繫屬於悲為悲所持故不得自在也又如人役屬於人王不得自在也此菩薩亦爾常為悲所牽不得自在也由此義故當念本願救一切衆生耳次除一切熱惱菩薩印作與願手即是也謂舒右手仰掌垂下之如喻伽中寶生佛印也真言係如上縛囉馱與願也以離因之法而得滿一切衆生願也嚩囉鉢囉鉢多二合先得也若先不得所願云何能授與人耶猶先得所願皆自滿足故今憶本所願而與一切衆生令除一切熱惱也所以者何尊者本立誓願志求佛道今已得之故當憶本所願度一切衆生皆令入佛道也次不思議慧菩薩印以施無畏手空風相捻如執珠之狀也其手當側之如擬人勢令指捻珠珠向上也掌向外也又中指稍相離而向內餘二指並豎之薩嚩阿奢一切願也跛梨補羅滿也謂令滿一切衆生種種勝願如如意珠也次地藏菩薩印先作指向內相叉拳申二火指豎之令指頭一寸許不相到即是也二空並豎餘如常也計都是簱此印如旗也真言訶訶訶離三因如上也吠薩末曳希有也一切有情常有我想種種苦惱才念之我想即除此方為希有也亦是希奇義也次寶處菩薩印右手作拳大指在外者即舒地水火指並豎之即是也此印又與經圖各異經即但言舒三輪亦無割折圖即地空屈入而水火風輪並舒當須審之真言係如上摩訶摩訶大中大也所以名寶處者如寶生於海從彼處生故名寶處也如寶在海從彼而有故得名也次寶手菩薩印右手作拳以空指壓諸指而直申水指豎之即是也真言囉怛奴二合寶也嗢婆嚩出也寶從手出也言此聖者從寶而生從何寶生耶謂從菩提心寶而生也次持地菩薩印作二手背反相叉合掌右仰左覆指頭相壓即以大小指相糾也謂左手大小指向上而以右手大小指向下相勾壓即是也真言陀羅尼地也以地能持一切物故以為名也陀羅持也持諸佛地荷負衆生故以為名亦令衆生皆得此地也次寶印手菩薩印先作向外相叉拳申二火指令頭相拄大小指皆並豎之其二風指當中指背而勾屈之勿令著中指背狀如五股金剛即是也有少異二水向內未定宷之真言囉怛那二合寶也涅誓多生也從諸如來寶而生也次堅固意菩薩印如前五股之狀令諸指頭併相著即是也真言嚩折囉三婆嚩從金剛生也從於金剛不可壞智印而生故以為名也次虗空無垢菩薩印作三補吒以空風指頭相捻令合聚即是也與如來刀印同真言伽伽那引虗空此曩長聲是阿字聲也阿難多無量也娛折囉行也無量行同虗空故名也次虗空慧印如前轉法輪印同也真言斫羯囉輪也伐底轉也言聖者先以得是法輪願為一切衆生故轉此法輪也次清淨慧菩薩印作三補吒雙屈二空入掌以二風屈壓其背上其風指環屈令甲相向即是也真言達摩法三婆嚩生也言此菩薩得法自在同佛境界從法而生故名法生也謂從自性清淨之法而生也次行慧菩薩印同觀音蓮華印即是也空地相捻六指開張如上也真言鉢曇摩二合蓮華也阿賴耶藏也藏即菩提心也從彼胎藏而生也次安住慧菩薩或云金剛住慧或云住慧更審作向內相叉拳合掌申二風指豎之頭邊少許勿相著即是也二空並豎之此印與多羅菩薩相似但少開耳與圖異更勘文殊印真言枳娘拏智也納婆嚩生也從智而生也疏言此中有金剛住第一菩薩真言重也不用之疏無安住慧真言印等次執金剛次安住慧菩薩印如前五股金剛即是也真言嚩日囉二合金剛也迦羅如前作五股印其二風指去火指上節一麥許即是也真言室戰荼戰字有遮聲是生死義謂離生死也上有點是大空言此生死同於大空也荼是戰敵義猶離生死等於大空是以無能對敵之者也句義戰荼是暴惡也摩訶盧瑟拏大忿怒也如上所説無能敵者所以為大忿怒也吽同前但三解脫以如上之法恐怖衆生令離生死得三解脫也次摩摩雞菩薩印如前五股金剛其二空指二地指皆入掌中亦右厭左如向內叉合掌無異但火風指如金剛而已金剛母也怛㗚二合吒怛㗚吒此中多聲即是平等同於如如理是三昧也吒是離我慢也住此如如所有我慢自然無也再言之者最極之義也社也底勝也謂以如如無我之法降伏一切障難令恐怖而伏之即是戰勝義也次金剛商羯羅是金剛連鎖也大智之鎖也如前作轉法輪印先以地水火風指相勾即向下旋轉向裏轉之當於胸前令二空指向外其二空亦令右厭左相勾也真言吽三解脫如前説畔陀畔陀縛也謂離二種縛即是煩惱所知縛也母吒也母吒也如壯士捉縛無力人戾斷其頭令身分破壞令碎二障亦復如是是故以為義伐折嚕金剛也納婆吠生也從於大智而生也薩嚩怛羅一切處也鉢羅底呵低無有能害也次金剛忿怒月黶印此金剛在佛額毫相而生故以為名毫相明淨猶如滿月故號月黶也如前五股金剛印屈二風如勾而捻二空令少屈不相捻著即是也與圖異也與經同圖上即前印舉二風輪如鈎與二空少許不相捻是也真言頡利二合離因無垢傍有點極忿怒義也吽三解脫也泮吒極令除故次金剛針印作向內相叉拳豎二風指頭相著令如針狀即是也真言曰薩嚩達磨一切法也涅上達嬭穿也以金剛慧針貫達一切法也伐折囉素脂金剛針也以何物穿之謂以金剛智針也嚩囉提與願也猶先願力故今已得此願亦當令一切衆生皆達諸法源也次金剛槌菩薩印法作向內相叉拳二空並豎之為拳並二肘相近稍高豎之以象槌形也舉向右邊如欲瞋打狀真言薩普吒也散也以金剛慧槌擊三毒縛令分散破壞也三婆上吠生也誰能作此事謂從金剛生者乃能作也次難勝金剛印右手作拳豎風指而當心上左手作拳皆大指在外此與圖不同圖上定拳空輪在內也直舒臂令拳稍高與頭齊也以一切魔不能嬈亂勝之故得名也真言訥達羅沙二合難降伏也摩訶盧瑟拏大忿怒也以何法而伏衆魔由有大忿怒也佉駝耶食也食一切煩惱等障結薩縛怛他揭多阿曳然一切如來教也俱盧奉也謂奉一切如來教當隨教敕而作也次相向金剛猶與難勝相對狹門故得名也其印如前唯翻右為左耳係如上阿毗目佉相向也摩訶鉢囉戰荼極大暴惡也佉馱耶食也緊紫羅曳細何不急速也三昧耶本誓也摩奴薩末羅憶念也本於一切如來前立三摩耶誓啖一切煩惱今何不憶本所願急速作也次如前佛鉢印即是釋迦佛鉢印也真言薩縛吉隸鑠一切煩惱也涅蘇那曩掘也如利钁掘地直下令徹底也薩嚩達磨一切法嚩失多自在也鉢嚩鉢多得也謂於諸法而得自在也伽伽那三銘虗空等也以於諸法得自在故等於虗空以此法而掘煩惱也次如前毫相印即釋迦毫相印也次以右手五指聚捻之置於頂上此即一切佛頂印也真言𮢥音縛也二縛謂煩惱所知之縛悉令如空也吽吽吽離三因得三空證三昧也次不動尊印左手作拳舒風指火指以空指壓地水指甲上為刀鞘其右手亦如是作之為刀內刀鞘中即不動尊印也其鞘手仰刀手覆也真言如前品已後諸尊真言並準前品降三世印如五股金剛即是也更問次佛眼印作三補吒雙屈地水入掌豎二火令合如針二風指轉捻二火指第三節上如眼形二空指並豎稍屈令當二中指下押慧水側使指頭如豎眼之形即是三眼也其地水指如向內合掌之法如前名為佛母印此中名佛頂印亦名佛菩薩母印次白傘佛頂印散舒左手令五指頭相去各寸許以為傘右手作拳而豎風指為柄以柄拄左掌心是也凡言作拳者皆大指在外他皆倣此真言如前品説次作勝佛頂印如前如來刀印即是也謂作三補吒火指豎合風空相捻即是也次最勝佛頂印如前轉法輪印是也次除業佛頂印如前鈎印二手作者即是也謂作向內相叉合掌而屈右手風指令如鈎形二空亦右絞厭左今單手即右手為拳豎風指稍屈上節是也如前文殊會請召印是也次火聚佛頂印同前佛頂印也次廣生佛頂印如前五股金剛印也次發生佛頂作蓮華印即前觀音印也無量聲佛頂作商佉印如前説謂三補吒雙屈二空以二風並厭之次毫相印以右手為拳便以空指於眉間拄之名真陀摩尼即是毫相印也佛眼印如前佛母印作之是中少異者謂開風指去火指背一麥許不相著如似五股之形即是也次無能勝明王印右手當心如執蓮華印風空指頭相捻火指垂屈掌中地水正豎即是也如前大悲生印少異直舒左手五指向上而向外托之指頭舒散也其手稍令高於頭即是也其立如前鉢栗底丁也反哩也次無能勝明妃印作內相叉為拳其二空指相並而與拳極相離開而屈之其節如似鈎此名為口狀也即是無能勝明妃印也次舒右手而托右頰稍側頭就手少許相著即是淨居天印此是思惟手也一名自在天次同前舒右掌其中指稍亞頭向裏令與水風輪參差稍作列形也即普華天子印也手當心前側之次亦如前舒右掌而亞屈空指令指頭當掌即光鬘天子印也次亦如前舒掌而以空風相捻如持華形即滿意天子印也餘三指相並合以上並淨居天子耳次兩手各以空水頭相捻以相捻之端雙掩兩耳遍音聲天子印也以火風指頭掩耳也此合在地天前謂其聲令衆普知也亦是淨居天也并淨居天印合為五天也亦云獨慧手作之宷勘次地天印先合掌其十指頭並屈而相捻令圓屈之空其掌內形如瓶子即是也次如前作施無畏狀而亞屈空指令當掌中即是召請火天印也作施無畏手以空捻地指第二節即一切仙印也從此下第二也此是普一切仙也先大指捻小指第二節其三指豎並也如其次第先開頭指次開中次開水次與地少相離次即都散五指此是五大仙也依經次第也次閻羅印作三補吒二風二地屈入掌令頭聚合以二空捻二風背節當第二第三間也其空指頭稍屈令當火指是也是壇荼印次右手舒指覆掌令如鐸形向下垂之閻羅妃印也次以定手屈地水指入掌火風相並而申之其空指微屈頭博風指根下文如尋常作拳也黑夜天印閻王后也次如前印但屈頭指以大指頭捻頭指第二節間嚕捺羅后印也自在天后印也更問次以左手猶如執蓮華形梵天后印也謂舒掌以空風指捻其中指屈當掌內圖中亦直申也問曰梵天無欲及女人等身云何言后耶此是梵王明妃明妃是三昧義印故義云妃也次左手舒掌而屈地水二指入掌中回風指捻著火指之背空指亦稍勾屈博風指下是嬌末離礫底印也礫底是器物印如圖此是大自在之子名羯底迦此嬌末離是其妃名也次以左手申地水火三指令外各舒散以風捻空此是那羅延后印也持華印掩胸也令此印向外托也次以左手作拳直申空指向上是閻摩王七母等印也七母皆通用之次舒左手而令曲如承髑髏之狀當胸前仰之是遮文荼印也左手以空捻地水甲上而申火風並豎之即涅哩底刀印也次以左手單舒散之如前轉法輪印但單手不相勾絞為異耳此是那羅延印以定手散豎四輪唯屈空輪於掌中橫著掌是次舒散十指覆之以二空指相絞即一切龍印也次同即以右加左上是難陀龍王印回左加右上是小難陀龍也如前九頭龍印平覆二掌各直申四指分為羽二空指絞如觜是金翅鳥王印一名迦婁羅王亦令怖手仰也凡地居印多分單手作次舒豎左手令指頭不相著極搩散如戟叉形即以空地相捻捻小指甲也是商羯羅三戟印也骨璅天也如前印而並合三指即是烏忙那印別本名弩摩引耶印是商羯羅之后二印相似前者頭指少屈此直豎而散也左手作半蓮華印一如作觀音印法但一手作之耳此是梵天印別本云以空捻地文是次日天車輅印顯露合掌乃屈二風指頭捻火指第三節背上令與其二水指頭相對也其二水指亦在中指之背也別本仰定慧手並之以空各捻二水下文以風各繳火背即是與疏不同審勘之其月天印如梵王印無異但想有白月輪為異耳次合掌屈風地入掌聚合其火水指令圓屈如弓此是日后社耶毗杜耶印次風天印如前者謂申左手側掌屈地水指是也此是風幢印此印經圖及疏互皆不同經即言如前幢印是也向前亦無幢印圖上即以慧手作之仍屈火風入掌餘三皆豎今且並總書之未知孰是也先仰左手當臍如承把琵琶狀右手風空相捻餘三散申之向身運動如彈絃之狀是妙音天印此即攝乾闥婆等此是天后亦是乾闥婆類次如前羂索印是諸龍印謂作內相叉拳而申風指勾屈相捻是也但以左手作之即是縛嚕拏龍王印此印經上無次以左手如音樂天印圖中右手屈風指加火指背甲上餘皆散舒之而覆掌臨左手之上阿修羅印也別本屈風輪加空輪面上餘皆散舒其真言曰伽囉邏演伽行也以行不可得故囉者是無垢故邏者離相故演者無所得故上有點大空也乾闥婆作內掌拳並舒水指頭相到也本部三昧耶若事業印即單作謂大指加三指甲上而直申水指是乾闥婆印真言曰肥輸入馱清淨也薩嚩二合囉音也嚩醯你平聲出也義言出清淨音也皆世間三昧耶也次以左手作拳屈風如鈎與空指頭少許不相著一切夜叉印也亦可合作也別本云定慧內相叉如鈎二地二水皆合豎是一切藥叉印此是依經真言曰藥乞叉藥是乘也句義是啖食義也溼嚩囉自在也於食一切煩惱而得自在故以為名也次以左手空指捻地指甲頭而申水火以風指捻大指節上一切夜叉女印也亦可合作藥叉女印若依經即空地相捻餘三皆合豎是也若依圖定慧內叉為拳餘搩豎二火輪頭相去半寸是一切藥叉女印真言曰藥乞叉食也尾儞馱哩大也反明也句云藥叉持明也尾是縛義謂噉食此煩惱縛也次左手以空指捻三指甲即豎申中指一切毗舍遮印也亦可但如作拳形而申中指即是也依經二手內叉合豎火輪是也圖與經同真言曰毗舍遮揭底揭底趣也第一義趣不可得故次亦準前而稍屈中指毗舍支女印也唐梵二經同圖即定慧內相叉以豎二風微屈令頭不相著即是也真言曰毗只毗只跛是第一義遮是離生死義以知第一義故離於生死重呼者言極離生死也次二手合掌二空指亦並與極搩之令與餘指相離仡栗何印也此別是一趣非人非鬼也能恐怖人非人所持者是也此非此也是曜若近宿即合取九執為定也揭栗係行也垢也因也溼嚩哩也自在也鉢囉補多得也乳底明也諸曜故為明也麼也是性義也於明性中而得自在也呼彼名言於此中而得自在也次先作三補吒其二火指二空指皆相交右厭左是一切宿印也真言那乞叉哆囉二合諸宿涅那二合謂聲達儞曳食也謂食諸聲也那是空義乞叉曳是盡義謂一切除盡也哆囉如前是垢等義準言之謂食諸障垢也即以此清淨之聲普令流布所謂無垢聲也凡如上所説真言皆以美音稱彼實德發覺彼而令歡喜也次作三補吒雙屈二水指入掌餘如一切宿印即是羅剎娑印也凡上來所説地居天類之印經言雙手作或一手作者皆得也若持誦作務等因緣不暇兩手作者但左手作即成耳上來經中云左手圖中兩手者當由此耳真言曰羅剎娑囉是無垢也傍有點是阿聲即是行也乞叉是履空也地跛多曳王也指其德也令彼聞已歡喜滿衆生願也次舒左手覆掩口以舌觸掌即荼吉尼印也上字離因無垢上有三昧傍點是示忿也訶是因義有點亦忿也此等為首者如上所説諸印乃至荼吉尼為後若廣窮部類眷屬則種類無邊如大本經十萬偈中所辨今此品所説乃是略舉其上首如提綱舉目衆網目皆舉耳祕密主如是等佛信解生菩薩標者如來已證平等法界以本所願大悲力故以神力加持而現此方便身密之門為令一切衆生皆得信解同入一切智地是故如是等印當知從佛信解生也當知如是印等是諸菩薩之標幟也謂以此方便示如來內證之德故云標也如印衆多乃至身分舉動止住皆是印者若阿闍梨明解瑜伽深達祕密之趣能淨菩提之心以心淨通達祕密法故凡有所作皆為利益調伏衆生隨所施為無不隨順佛之威儀是故一切身所有舉動云為無不是印也何但身業而已乃至一切所有語言亦復皆是真言也以是故祕密主真言門修行菩薩已發菩提心當住佛地漫荼羅若異作者即為謗佛及菩薩等同越三昧耶罪決定墮惡趣者謂今末世諸真言行菩薩已發大心者當住於佛地然後造立漫荼羅若不如此而擅作者即為謗佛也是故上來所説阿闍梨當了知彼印真言等法一一不違軌則又當久修瑜伽之行淨身口意業體解平等三業法門之行由此瑜伽及真言并身印等所加持故即是同於諸佛菩薩等身同於佛位以此相應三昧事理不相違而建立圓壇乃至方所色像等一一稱理又不錯失善知次第當知必定獲大利不虗也若不爾者即得越三昧耶罪三昧耶者即是自誓也一切如來所立誓願為欲普為一切衆生開佛知見令悉如我以方便故而立此法是故猶如世間大王之教敕不可過越若越者必獲重責也是故當與菩提心相應住於佛地而作之若不順教者徒費功夫虗棄光景終無所成徒招罪咎無所益也是故行者當審求經法又訪明師勿為自誤已廣説印品竟
