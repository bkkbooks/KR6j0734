body:
  text: 沙門一行述記世間成就品第五經本是第三卷初世間成就品者祕密主前問云何持真言云何彼成果世尊因此廣説所持真言自此以下正明受持真言次第儀軌及作成就法也如來以甚深祕密藏不可以言説示人故假藉世間有為事相以況喻法界藏中甚深緣起若有衆生通達此中世諦者自然以加持力超悟第一義諦悟第一義諦時則於世間實相倍復明了故名世間成就品也復次行者初依有相瑜伽世間成就故漸淨六根面見十方諸佛乘此加持妙用遊戲神變廣利衆生然猶樂世間悉地今觀如是悉地但從衆緣生故無有生滅斷常去來一異皆如夢幻泡影鏡像水月乾闥婆城爾時諸戲論滅故即是除一切蓋障三昧故不應離此別求出世間成就也佛説偈中如真言教法成就於彼果者凡作成就先當具諸支分作前方便供養承事法其次第儀軌與持明藏常途所説大同但此中一切衆緣皆成法界幖幟所為事業盡帶瑜伽故蘇悉地等諸經要用此宗決之方見深意此則與常途異耳傳法聖者出此三千偈經為存略故於此品中若諸阿闍梨等共所通解者不復具出但舉經中攝頌云如真言法教成就於彼果自此已下心想念誦法餘經所祕今則具言之也阿闍梨於烏仗曩國撰出毗盧遮那供養次第法正是此品所要文多不可備載當別釋之然彼中略有五分第一先當具持三昧耶學處第二次應增益守護清淨行所謂每日三時如瑜伽法敬禮十方諸佛説悔衆罪歸依三寶捨身奉施發菩提心隨喜勸請乃至回向修習三三昧耶金剛甲胄淨法界心如來大護等淨除魔事之法第三次修供養儀式所謂先以囉字門自淨心地及此穢土次當起大風輪及香水海以阿字門作金剛地具足嚴淨大寶莊嚴然後以種子真言轉作大日牟尼等剎塵大衆如法請召示三昧耶奉閼伽水獻蓮華座次以不動慧刀淨除內障金剛薩埵加持自身降伏魔已結作周界更復奉閼伽水以法界心慧刀所淨供物如法供養以虗空藏明轉持大供莊嚴雲以金剛語諷詠如來真實功德觀佛化雲遍一切處導利羣生如是具法供養已第四當起利益無盡衆生心如法持誦即此品中當字字相應已下具説方便今隨文釋之凡行者欲修觀時先當住瑜伽座以阿嚩囉賀佉五字加持自體如悉地出現品及供養次第法中所説所以然者諸佛無上菩提雖復寂滅無相然要當以金剛身坐金剛地方可入證自餘虗幻身土力所不堪瑜伽行人亦復如是欲入微細瑜伽觀如來無邊境界故要當以此方便自護身心又當以無垢眼觀心蓮華臺上阿字門頂上置暗字百光遍照王以此自加持故即同灌頂牟尼之位堪作金剛羯磨猶如具戒比丘乃應和合僧中同秉法事也復云行者先當一心修習心持誦法使分明諦了任運純熟欲於現法之中作成就故當依數時相現等方便以自期致心如法作先持誦能證知障蓋消滅方作具支念誦又自證知悉地前相然後應起成就漫荼羅今此經文從字字相應迄至彼等淨除已皆是泛明修習持誦法迄至作成就法事時還同此法持真言也凡修習心意念誦者先依前法轉種子字作本尊身如彼色相威儀寂心法喜威猛等皆如身密之印不得差謬然亦隨事而轉如作息災持誦即觀本尊如白玉色住於寂默之容若作增益持誦即觀本尊作真金色住於法喜之容若作降伏時誦即觀本尊作烈火日暉色或如緑寶玄雲色住於威猛之容今此所論即是常念誦時當一一如漫荼羅本相也當於此尊心上而觀圓明如淨滿月輪空明瑩徹於中現種子或從南謨乃至娑嚩賀字次第而現以一心住於緣中故名為字字相應或此字合而成句一時炳現猶如輪像或如鬘形明白無垢循環右布亦一心住緣中故名為句句相應也行者初修習時恐心散亂當但觀種子久後純熟當稍加之見此一一真言字如淳淨乳如貫明珠遍有光鬘次第流注入行者口中或從頂入阿闍梨言亦可隨其面門起從一處流入然以灌頂為善也如是流入時當觀遍布身分充盈浹洽恬怡內暢如甘露灌灑能令無始時來身心垢障漸次消除如觀字者或觀契印或觀本尊流入行者身中當知亦爾或見此真言輪已當即調知氣息令脣齒相著而心誦之以舌不至齶但於口中微動而不出聲故瑜伽宗名為離聲金剛語也持滿一落叉者謂以金剛語持之令滿十萬遍然一是衆數之母自餘一切法數皆在其中若滿一落叉未有證驗又當更作一落叉要令成就一月二月等義皆如此也若深祕釋者落叉是見義謂境界現前以心目觀之一緣不亂故名一見如是住一緣時假令種種難起或化可畏形像諸散心人覩之能令狂亂或發大聲假使山王亦可破碎爾時心不驚怖亦不動轉故名善住一見也復次非但見之而已亦復聞之如下句説故廬山遠公念佛三昧序云玄音之叩心聽即同此義非但聞之而已亦復觸之所謂先時多病今悉除愈先時火大增盛者今得清涼先時水大增盛者今得溫養乃至入口時如甘露味又於緣中自然得悟十緣生句即是證知義也經云初字菩提心第二名為聲者言最初觀圓明中字此字喻如菩提心以真言妙用因此生故第二從此字出真言聲猶如從菩提心起大悲萬行若聞真言聲時即隨其義猶如藉大悲萬行得悟菩提也復次梵音阿乞灑囉此翻為字以一切法本不生故即是菩提心義也乞灑是法爾如是非一切如來所作非作故性寂囉者言此心本淨故無塵故名淨菩提心從此淨菩提心出如來無邊語輪相故云第二名為聲此是深祕釋也行者初修習時既見圓明中字次從字句出真言聲譬如和風諧韻鈴鐸亦如叩擊鐘磬初字既出聲已運運漸微次字續即發聲如是循環無有間絶流入身中冷然猗樂不可為喻如清飈扇物昏蓋消除善住義亦如前説經云句想為本尊而於本處作者句是住處義即真言聲中實義所歸趣處猶如百川赴海亦如大悲萬行皆趣涅槃故名為句句即為本尊身者如如來一一相好皆具無量福德集此相好乃成佛身此中義亦如是一一真言聲具無量義集此衆義成真言身且如法界生真言云達磨馱暏娑嚩婆引嚩句憾􅁤此十字各是一真言門一一門自具衆義今合此字以為衆名初達磨是法次馱暏是界次娑嚩婆引嚩是自義次句憾是我又以衆名共成一句云我即法界自性故此句義共明一法界身故云句想為本尊也若就學觀説者謂人先見一一真言字形色炳著次從諸字發聲今又總此聲字轉成本尊三昧耶身在圓明中深邃而住當知此尊即具三密以衆字形色故具足身密以衆字音聲故具足語密以衆字義趣故具足意密以三事等故當知行者一緣不亂善住三密觀中次即觀此尊身不作內外之想爾時見本尊身即是自身此是第二轉於一相心中善住一落叉法於諸持誦門中最為勝上故云當知第二句即諸佛勝句也猶入此勝句故於普門漫荼羅種種身土隨所欲見者即隨意轉成若欲聞彼真言聲亦隨念而出若心有所未悟欲咨問者本尊即隨所問而為説之故能隨意所期作諸成就而今世間執蘇悉地等經不知祕決故如文而住誦十萬遍即望悉地在身何時可獲耶復次經中更説勝妙方便故云行者觀住彼極圓淨月輪於中諦誠想諸字如次第中置字句等而想淨其命命者所謂風念隨出入息彼等淨除已作先持誦法謂行者如前一緣一相觀圓明中本尊轉作自身已爾時行者但見自身在此淨月輪中一如本尊無異亦於心上具有圓明明中以誠諦心而觀諸字若單字者令字字連環相接猶如貫珠若置句者亦次第右旋瑩然明徹又一一字周匝皆有𦦨鬘淨妙無比其圓明外亦有光明如秋夜無雲涼月顯照然彼用此真言為出入息息若出時此字隨出息若入時字亦隨入轉調轉寂息遍於身爾時不見別有喘息但以真言為出入息以此方便故則能滅除種種覺觀戲論漸淨六根又如是觀時亦隨義用差別如欲內寂其心即白色欲增功德即當黃色欲調伏內障即當赤色白是本淨義黃是金剛不壞義亦是智光明義也如世人業壽之身以息風連持故命根不斷亦因此息風運動身口作諸事業行者亦爾以此祕密加持淨除其命使無始已來業壽之垢一切消除成本不生真言之命以此持功德身令不失壞方可運動三密作諸成就也若指事而言今此命者即是息風如此息風令心散動如風中燈照用不圓今作此隨息方便靜散亂風乃至綿綿漸微出入息斷爾時圓明慧心如密室中燈恬然直上魔事不入照用無偏若能如是者方可於此生中現求悉地而作先承事法故云善住真言者次一月念誦也若行者初習持誦時亦可外觀本尊心上圓明字句明現亦如前説然後隨息出入若息入時此字從本尊心上入自身中若息出時復隨息而出至本尊心上如是次第循環念念無間其後不見別有出入息但隨於字漸更深妙無聲無字但當任運出入爾時本尊身不異自身自身不異本尊也復次行者初習觀時雖暫得相應猶如電光倏見倏滅縱使明白不應味著而起貢高設令隱滅亦勿追念而自憂悔但一心如説行之施功不已久久自當純熟乃至真言聲字本尊合為一體息風淨除之後觀此圓明欲大便大欲小便小所欲觀者皆現所欲作者皆成譬如巧工得百練臘變轉無礙隨意施為是名初種子心行者先作字聲本尊觀如是合之方成種子如人初託歌羅羅時命識暖合方成種子又如已得穀種植之良田方便養育必得成果行人亦復如是已得初種子心次作一月先承事法即是種植方便也經云行者前方便一一句通達諸佛大名稱説此先受持者前方便正是先持誦法當依毗盧遮那供養次第法具足修之所云一一句通達者即彼供養法中一一瑜伽道皆使明了現前如初始莊嚴道場時從風輪際迄至金剛地上種種莊嚴如彼文所説無不成就次用種子作本尊時即見塵沙菩薩衆等皆悉坐蓮華臺布列圓光之內行者為習成就漫荼羅故當如大悲胎藏圖位而布列之一一觀彼身相并所持印見真言字亦聞其聲至供養時即觀此一華作種種華雲普遍十方世界作諸佛事供養一切賢聖行者於圓明中悉具見之諸餘供物當知亦爾如觀化佛雲時即見自身漫荼羅中一一諸尊各放無量光明光中有無量佛坐蓮華臺往至十方以一切衆生所喜見身隨衆生性欲而導利之亦於圓明中具足明見次應如法持誦持誦畢已當如法供養次第第五分中出道場時行者更以諸餘善品調伏其心於一一時中不虧法則具如彼説也當知十方諸佛為令持真言者已得調牛良田純熟耕墾於現世田中布悉地種堪任降大悲雨廣植供養善根故説此一月先受持法也復次今説深心持誦法謂行者如前觀真言字或觀契印或觀本尊命風靜息恬然安住時但當以慧照之而觀其義如住阿字門時當以四不生等句而觀本不生義若住金剛印時別觀金剛般若義若住蓮華印時別觀蓮華三昧義他皆倣此今借涅槃經春池譬喻明之如學摩訶衍人皆知此心識中有實相寶但以無善巧故各以有所得心競持瓦礫謂是真琉璃珠歡喜持歸還為智人所笑今以真言方便一緣善住時還由淨菩提心力三障消除寶性明現然此只是觀心未是證心也當爾之時不可攪令波蕩又不可恐紛動故而不取之但當一心方便安詳入水如龍樹阿闍梨所説中道正觀及此真言住心品中十緣生句徐運慧手一一披拆磔之令至寶際要令明珠在掌方是見心明道人也爾時行者若入阿字門即得本不生寶乃至入賀字門時即得離因緣寶獻塗香時即得無障礙戒寶獻華時即得大慈生寶獻燒香時即得遍至法界寶獻燈明時即得轉無明寶如是入無量門皆當廣説由於一一支分皆見深意故名為一一句通達也若行者修此世間成就前方便時雖未能頓入法性亦當以無所得為方便隨分修行若無般若波羅蜜氣分則是三障中人頂行眷屬云何能獲初悉地果故大品云欲以一食供養十方各如恆河沙等諸佛及僧當學般若波羅蜜欲以一衣華香瓔珞末香塗香燒香燈燭幢幡蓋等供養諸佛及僧當學般若波羅蜜即此意也復次行者初一月將滿時於此心供養中當有證驗設令天時大旱或有種種災患行者隨用一華或塗香等供養十方諸佛回此功德願令降雨即隨其心甘澤普洽若願所餘災患得消除者亦隨其意尋皆息滅當知淨心種子力用漸彰如根芽漸生宜應方便長養故更作兩月供養法也經云次當隨所有奉塗香華等為成正覺故回向自菩提如是於兩月真言當無畏者謂於供養法中一一支分悉通達已當隨其所有於日日之時辦塗香華燒香燈明飲食等以普遍心供養三寶發大悲願廣及衆生由自功德力與如來加持力及以法界力和合故令此功德雲海等同虗空不可窮盡隨行人心力勢分所作皆成即以如實功德回向大菩提心願成就悉地以福德圓滿故諸障消除是故作成就時無能蔽之者猶如枝條華葉具已滋榮從此無間必成果實故云如是於兩月真言當無畏次作成就法者正是守護增益此功德華令不夭傷普成熟耳復次深祕釋者月喻菩提心行者入初住地時此心極圓淨故名第一月從此已後用月喻之心起大悲萬行供養三寶廣植善根乃至入無動地名為一月供養從無動地已後復以月喻之心起無量方便智業正順回向如來悉地迄至金剛地名為二月供養二月滿已即於菩提漫荼羅作大成就若細分別者就一一地復有因根果三心例如初品中釋今此品所明雖是世間成就然甚深方便隱在其中若求出世成就時還擬議此法以成祕密之分故持明藏法猶若因陀羅宗能滿世間出世間種種希願也復次如上所説次第念誦法則為世間大成就故若行者具依此法得成就時即得六根清淨或悟旋陀羅尼總持不忘即以此身遊諸佛剎住壽無量供養親近諸善知識廣利衆生或以手揮空出種種珍寶給與諸匱乏者然尚是生身未得法性身故名為世間成就此中作成就法後品當更詳説也然此法如如意珠亦能曲順世間下劣希願若諸行者欲作世間上中下品成就事者當參用蘇悉地等諸經仍依此品修習心持誦法但能外觀使得明了便可依法作諸成就不必轉為自身故供養法中偈云智者如先所開示現前而觀本所尊於其心月圓明中悉皆照見真言字即應次第而受持乃至令心淨無垢數乃時分相現等依隨經教已滿足志求有相之義利真言悉地隨意成是名世間具相行四支禪門復殊異也若深行阿闍梨自當於瑜伽中具識成就證驗今為淺行作者略明祈請之法行者滿二月已當於黑白月八日十四日十五日日月蝕日等或但於白分之內澡浴清淨著新潔衣誦扇底迦真言而作祈請至於暮間廣設供養并作護摩用童女所合縷線持作七結每結一誦真言如是都了復誦真言七遍繫左臂上思惟本尊右脅而臥當於夢中見自部主或真言主或見明王或見三寶菩薩衆等或見自身誦持真言作諸事業或著白衣或他來供養或登山峰或見乘象或渡大河或升果樹或乘師子牛鹿馬等或乘飛鵝孔等一切飛禽或見美女佩帶瓔珞手持華瓶或於夢中受得象馬車乘諸寶物等或夢得華果蘇乳酪稻華等或得數珠或見澡浴清淨熏馥莊嚴當知皆是悉地之相如蘇悉地説又妙膊童子經云若行者成就轉近當於持誦事業極生愛樂心不攀緣雜染之境亦無飢渴熱惱等苦於諸違法外相之境心不動搖蚊虻毒蟲不敢逼近毗舍遮等諸鬼不敢踐履其影所出言教皆悉信受轉加聰明善綴文章諸書算伎藝自然巧妙心樂善法勤勇修行身無疾患垢污若人見之及與聞名生敬念心或見伏藏於虗空中聞諸天語復見其形及乾闥婆藥叉之類若見此等勝相便可作成就法也又行者欲作成就時當如蘇悉地方便作光顯增威等法灌沐本尊預辦具緣支分自作除一切障大灌頂漫荼羅如法供養然後起首作成就法當如初品方便擇治淨地作漫荼羅方正四門其量八肘或七肘或五肘唯開西門於西面四肘之外作灌頂漫荼羅等中胎量唯開東門其伴侶菩薩等準同前説於大漫荼羅四角外更置三股縛日羅二合中胎八葉華上及餘三重各置諸尊祕密印相又於中胎佛位之前置本尊印并置一瓶所餘灌頂四瓶在四隅際門外別置一瓶以降三世加持自餘供養儀軌皆如第二品中説既供養已應作三種護摩為欲遣除毗那夜迦故應用成辦諸事真言作阿毗遮嚕迦事為自利益故應以當部之心作補瑟徵迦事為息諸災難故以當部母作扇底迦事如毗盧遮那眷屬即以虗空眼真言或依第二品中寂災真言如護摩法蘇等諸物以三事真言各供養百遍或增加其數次為諸真言主等各供養七遍其上首諸尊亦當加之或用寂災真言通供養百遍乃至不辦者應作七遍或三遍已然後灌頂其中胎寶瓶亦如前每日以不動尊加持竟在華臺上者又用正等覺心加持在四隅者四菩薩加持本尊前者用彼真言持之當令助伴次第為其灌頂或請阿闍梨令作灌頂若依蘇悉地法先用軍吒利瓶第四用所持真言瓶其餘二瓶隨意取用如彼具説也將灌頂時行者安住蓮華臺上觀囉字門自焚其身悉為灰爐已既灌灑竟還用嚩字門生之以祕密瑜伽觀自身作大悲漫荼羅竟應以牛黃塗香𡼡香芥子線釧衣服等以自莊嚴復當敬禮諸尊旋繞供養為息障故更作護摩然後發遣以此因緣故諸尊歡喜令悉地速成也經云山峰或牛欄及諸河灘等四衢道一室神室大天室者是略辨作成就處所蘇悉地云若上成就於池邊作下成就隨處而作或與真言相應之處當就彼作不依此處成就稍遲於有舍利制底中作一切內法真言皆得成就然佛生處等八大塔中最為勝上若於菩提道場作法者一切魔事不能留礙凡猛利成就於冢間作或於空室中或於一神獨居之廟或迥獨樹下或於河邊作之若欲成就藥叉法者林間作之欲成就龍王法於泉邊作之欲成就使者法當於人民集會之處作之若欲成就入穴法者於窟中作之此中深祕釋者欲作上成就時非但選擇名山超出喧卑之境多有清泉華果處亦當安住如是菩提心山超出覺觀戲論多生總持功德處以內外支分相應故能以不思議法力轉成世間悉地之果若不得如是高山次擇平地則以牛欄為勝以離聚落憒閙又潔淨故牛是修觀行者調柔通達之心以生正法根身堪能續出五種醇味欄以無戲論戒命風靜息於功德田中而牧養之比六根清淨高山又為其次也河灘是自為洲渚之義阿含以四念處觀為自洲不異洲自歸不異歸今此宗於本處作本尊身亦是修身觀義言行者雖未得一切調柔但能造斯觀者亦能滌除業垢之命斷隔毗那夜迦往來行處故為次也四衢道者是所欲趣向皆通達義言行者雖未能自身作本尊像但能以聲字本尊融為一相正住三密觀中不為四邊執諍之所障礙者自然隨所趣向所作皆通故可成就如來使者之用次云一室者雖未能渾合三密但能堅住一見善護其心不為八法風雨惡覺蚊虻之所嬈亂者亦可隨其力分作小成就又云神室大天室者神謂本尊大天即是諸佛此中室者名大慈悲言行者雖於一見之中未能不動不轉但能修本尊觀明白現前諸有所作以大慈悲為本依數時相現等方便以如來神力庇衛其身有為事相無虧法則亦堪作小成就及降伏等自此以降則雖精進勤苦至終恐無成也經云彼漫荼羅處悉如金剛宮是處而結護行者作成就者此中正作法時具支方便至下品當更説之又云即以中夜分或於日出時智者應當知者有如是相現吽字或鼓音若復地震動及聞虗空中有悅意言辭應知如是相悉地物如意者凡悉地成時有三種相若初夜成者為下夜半為中劑明相動至日將出已來成者為上妙膊童子經云此中有三種相所謂增長氣煙光現次第得獲三種成就若得氣出者當得世人愛敬等益煙出得轉形悉地光出成持明仙潔淨微細之身若作心成就者或畫像動或見嚴身瓔珞華鬘等動或從空降種種天華或微風細雨或覺地動或聞空中無形之聲作如是言汝所求願今當説之或見燈焰增長其色潤澤曜如金光或復油盡光轉增盛或身毛遍豎心大歡喜或聞空中天樂諸天瓔珞之聲或於空中見本尊身眷屬圍繞即應奉持閼伽五寶華香之水讚歎供養恭敬瑚跪自觀功力而求諸願既得願已歡喜禮拜更獻閼伽應對彼尊誦所受真言然後如法發遣彼中具説方便也若深釋者初夜是如前覺觀乃至具成就時以心猶住於相義名為初夜中夜是六根漸淨不生法愛時例如小乘已過頂法爾時罪福正等從此已後轉近真明是故義名中夜夜分已過劑於日出喻見心明道時爾時所成就法名為上成就也復次下成就相自如常途所論若依淨六根中釋者即是於瑜伽中見無量持金剛慧者以加持大師子吼説此吽聲或諸如來以大法鼓音滿其所願或於定中見十方莊嚴世界普皆六種震動於虗空中説此梵音慰喻之聲而實來無所從去無所至如般若薩埵波崘品中所説當知是諸行人世間大成就相也復次行者自見心明道時現覺吽字門故得聞大日如來語密記聲動彼金剛心地生萬善牙發起大悲萬行遍發如是阿僧祇大願時十方諸佛皆悉現前共以梵音慰喻當知是諸行人出世初成就相也爾時世尊欲結會此中大成就義故更説偈言諸佛兩足尊宣説於彼果住是真言行必定當成佛應一切種類常念持真言古佛大仙説故應當憶念此中一切種類者即是開方便門示真實相以一一真言門悉具淨菩提三句義故當知十方三世諸佛種種方便究竟歸會皆趣其中是故於一切種類中盡應照見真言實義次復敦信勿令失墮於心也悉地出現品第六悉地出現品者如前品所明雖能滿足衆生微小希願然彼調心方便供養修行本為成辦世出世間大成就事若求大成就者不於一切種類中皆見真言實義到悉地修不得成故次明悉地出現品正明如是悉地皆從法界神力中流出也謂行者觀此成就之果為從調心供養諸善根力生耶從如來加持力生耶從法界力生耶若由自善根力即是從自性生若由佛加持力即是從他性生若和合有即是共性生亦非無因緣有若謂悉地從法界力生者法界平等則無生相若出平等法界而有悉地生者則墮邪見戲論中生義不成若謂都無悉地則為誹謗如來祕密之藏當知如是悉地即於衆緣起時本不生故法爾如是非是行人所作亦非佛作作不可得故乃至離諸因緣故即是心之實相即是悉地實相以實相度諸魔事故作成就時無能障蔽之者隨此如意寶中所欲皆悉現前故名悉地出現品也爾時世尊以普遍加持眼復觀諸大衆會知已堅牢深淨堪持大法為滿一切願故復説三世無量門決定智圓滿法句所以然者世尊已廣開示三密漫荼羅又説入無量門進趣方便竟欲令此中普皆成就悉地果故更説一切法界門決定智印此決定印是真言實相也謂以無礙淨慧於一念中了三世法知彼皆從緣起無有自性以無性故不出淨菩提心是故等同虗空深廣無盡離諸分別如毗盧遮那法界門乃至最下世天法界門一一成就之相悉皆如是此是究竟實際萬法所歸會處故名圓滿法句也偈初云虗空無垢無自性者正説心之實相心實相即是一切法中決定智印也以無邊際無垢無分別故少分喻如虗空而實等虗空心亦復不守自性故非彼所能譬喻如是義故雖復等同虗空無相而具種種不思議權巧曲順根緣而導利之然此權巧但從機應因緣而生是故法爾空寂常無自性以法常無性故即是本初不生本初不生即是入阿字門入阿字門即是毗盧遮那本地身也如自觀心實相諸法亦然是故一切諸法皆悉甚深難見唯佛與佛乃能證之故法華云諸佛兩足尊知法常無性佛種從緣起是故説一乘統論彼經深趣在斯一偈也若行者見一切從緣起法皆是毗盧遮那法界身爾時十方通同為一佛國是名畢竟淨菩提心以此畢竟淨菩提心隨無盡法界無餘衆生界機應因緣一時普現色身行菩薩道於念念中供養無量善知識悟入無量諸度門如是於無量阿僧祗劫中恆殊勝進嚴淨一切佛剎成就一切衆生所作佛事未曾休息是名普賢行願具此普賢道時能隨一切衆生心所思念滿其種種希願乃至施與無上菩提願是名一切菩薩真多摩尼當知諸進趣門雖復無量至論宗極悉皆為此一事因緣三世如來更無異術故此伽陀名為三世無量門滿足法句也復次有人生疑云何實際心中能作如是種種有為事故偈中更説譬喻云如世間一切諸趣及彼依報住處皆悉依空而住因空得成而虗空的無所依亦無念著起作之行今此清淨法身亦復如是雖常寂然不示諸法法相而遍無餘世界無所不為以從慈善根力因緣生不由惑業故云清淨生也如如來不思議境界經云普賢菩薩告德藏菩薩言世尊始從然燈佛所得受記已即便入於如來不思議境界三昧常無功用自然應現無量佛事謂於虗空一毛端處有一切佛剎微塵數等諸佛世界於中或現生兜率天或從彼沒下生入胎或現適生遊行七步自言我今即為生死邊際或現在王宮出家苦行或現降魔成等正覺轉妙法輪或現住世經無量劫或復示入涅槃或一切劫為一剎那或一剎那為一切劫劫與剎那無增無減乃至一切衆生未盡解脫剎那一時普於此諸世界常作如是種種佛事未曾休息而無功用如彼虗空一毛端處無量剎中念念普現諸佛種種威儀法則乃至遍空毛端量處亦復如是常作佛事利益衆生窮未來際初不休息而佛剎不減微塵不增何以故一切諸法如幻焰故如彼廣説故云無餘清淨生也次云普勝生嚴修此故者勝是尊先之義如世人謂舊德可師軌者為先生即是先覺是法而從胎藏生者梵云避部是具足種種財寶以自莊嚴古普勝人皆因修此真言行故令世間佛種相傳不斷以至于今若離如是法句更有如來行者無有是處故云非他句有難可得以能出生一切如來行故隨是法句出現之處即為有佛出現世間普作照明猶如大日故云作世照明如世尊入此法明門者常遍虗空法界行普賢道無終盡時故云説極清淨修行法深廣無盡離分別也復次此阿利沙伽陀即是如來神力加持句修諸供養時以梵音讚歎彌善今具存之誐誐曩引虛空也麼攞無垢也無也􅁥婆嚩二合自也婆引嚩迦引性也一句尾􅁌濕嚩二合巧也枳娘二合曩智也尾唧怛囉二合種種那引野迦引授與也二句舜引寧夜二合係呼異反空也􅁤娑嚩二合婆去嚩多自性也薩那常也三句鉢羅二合底耶夜引緣也地曩生也儼避引囉甚深也訥𭌆二合奢難見也四句竟一誦娑怛旦覩恆也尾勢引灑殊勝也誐弭難引往也一句撥邏果也莫仡囒二合最上也娜娜帝與也尾進𫪭單隨所思念二句拽他如也薩􅞣嚩諸也蘖底曩趣也阿引攞瑜宮室也三句誐誐奴虛空也坌底得有也阿上僧去誐無取著也遇拶囉行也四句竟兩誦也怛他去引亦也𪾼灑如是也尾秫詩聿反地平清淨也達􅝝磨跢引法也一句底哩二合婆去引嚩平三有也勢引灑無餘也尾秫馱清淨也三去婆嚩生也二句左囉帝修行也怛哩二合喻引此也仡囉二合祚祖魯反尾部勝生嚴也三句婆去引嚩帝有也薩􅞣嚩一切也爾慈以反乃迦諸佛也遇引左囉行也四句竟三誦曩跛囒非他也跛娜句也莽悉𫪭有也訥􅝵攞坌難得也一句索迦羅引遍也路引迦明也羯㘕作也拽入他引如也爾準上乃諸佛也正翻云仁者二句迦體跢引説也蘇尾秫上地極清淨也達􅝝磨跢引法也左囉多修行也三句怛囉二合無也尾羯臘跛二合分別也嚩爾多引離也四句竟四誦也尾補犂廣也達􅝝磨法也儼避囉深也莽嚩無改反曳無盡也亦無壞也右梵本於四偈外更有此一句助聲今為文便故通入四偈中也爾時大日世尊説此普門決定智印印諸種子亦印萬行根牙及悉地果竟即告諸大衆會言汝等各從一門皆隨自所通達而現法界神力悉地流出句若諸衆生隨於何等法門見此法者歡喜踊躍得安樂住故此中神力亦是動用神變之義亦是增廣義謂從一得多乃至無量也流出亦含多義或名為得或名為門然以流出為正也時執金剛等皆悉頂禮世尊而説是言如是法主依所教敕以蒙大師命故一心敬順不敢有違而後乘問復請佛言唯願世尊哀愍我等示現悉地流出句何以故於尊者薄伽梵前而自宣示所通達法非是所宜善哉世尊唯願利益安樂未來衆生故此中凡有三意一為自修慚愧謙退之行示諸行人尊師敬道儀法故二為諸聖者等各於一法界門究了通達而令法句圓滿於一門中各具一切門自惟心量不能及故不敢於世尊前説所證法三為先請世尊演説普門成就法已然後諸菩薩等各從一門而演説之則條派可觀法門有序今此三千偈為本存略故書不盡言若行者瑜伽成就時自當具足聞見也佛讚金剛手言善哉善哉善男子如來所説法毗奈耶稱讚一法所謂有羞者佛觀諸大士等雖則智慧方便無量無邊自知如十四日月小分未圓滿故不敢於如來前有所陳説是即善人之相故歎言善哉也梵本羞字與慚愧各殊今言有羞則兼備慚愧二法當知此二白法即是萬善之因故世尊推廣其義所謂以有羞故速生二事一者不作所不應作者二者則為時俗稱譽名為有羞恥人今諸佛子以具慚愧心故則自觀察如來種姓不越正三昧耶故為十方聖衆常所稱歎也復次以有羞故速生二事得與佛菩薩同處以要言之一切功德未滿者能令滿足得與大悲漫荼羅大衆常會一處也復次以有羞故更生二法謂住尸羅生於人天尸羅是清涼義如苦熱蒸者得入八功德池遇毒病者塗以海岸栴檀灌以甘露爾時內外清涼身心安樂故名尸羅行人亦復如是以有羞故得入大般涅槃第一清淨處還以方便生人天中何況世間善趣也此中當以三四五六等乃至無量法門廣歎有羞義以大宗可領不復備舉三隅世尊如是讚歎已又復誡令善聽然後演説悉地流出相應句如生身佛放光明時光有出處所謂白毫頂相乃至足下腰下相一一相中普皆流出毗盧遮那亦爾從大悲胎藏漫荼羅身一一身法爾真言相能令悉地功德普流出瑜伽行者方便具足時得與相應故曰相應句也從此已下廣明悉地支分最初明作成就人以是悉地正因故若行者道種未具法器不完則三密之果無由出現就此支分中更復分為多句第一見漫荼羅者如前得具滿法事同於受大戒人從此已後乃令修學諸真言行也第二尊所印可者謂行者既得灌頂更於餘日廣供養阿闍梨咨受真言法要當以吉祥寶瓶次第傳度如蘇悉地經受真言法品中廣明但此經宗更加深祕瑜伽義耳若不師師相受但執文憶度輒爾行之例如戒律如無師檀出家者非但無福反成障道雖精進苦到悉地不成也第三成就真語者謂所持真言非但而已又親蒙本尊印驗字句周圓兼作增威等法勢力成就則易獲加被無有疑心如蘇悉地滿足真言法及增威品説也第四發菩提心第五深信第六慈悲第七無有慳吝皆如第二品中釋此對祕密乘中四重第四句對不離菩提心戒第五句對不捨正法戒第六句對不於衆生作不饒益行戒第七句對不於正法慳吝戒若隨犯一一禁者諸善功德終不得生令此四心與彼極相違故必能成就悉地果也第八住於調伏梵云難多即是已調柔義謂以十種方便學處種種調御六情根故一切三業任運調柔如馴牛良馬堪可隨意服乘有所至到也第九能善分別從緣生法者謂能深修觀察十緣生句了知真言行門一切所作皆如幻化乃至乾闥婆城以無生無性畢竟不可得故即是空義不遮彼彼因緣合時有如是如是幻相故即是假義窮照實際不出於心故即是中義行者如是見時種種戲論滅故內外魔事無如之何方可作大成就也第十受持禁戒者此是真言行門別律儀法如蘇悉地持明戒品及毗盧遮那供養法中廣明能以無疑慮心敬順奉持不越三昧耶教則諸障不起悉地速成也第十一善住衆學者是真言門所應學事如前入漫荼羅品中衆多支分供養法中衆多支分今此作成就時衆多支分等乃至緣漫荼羅工巧伎藝明處皆悉勤心咨受如説而行臨事無疑不看他面譬如比丘法中已離依止名為住位人也第十二具巧方便者謂於真言事業曲盡能事善得變通譬如規矩繩墨衆匠所同而運思精微者獨得其妙是故雖犯大罪若於有巧方便者則易消除雖植微善若有巧方便者則令無盡如彼回聲入角飈火焚薪若不達如是權用則功力徒勤猶多滯礙也第十三勇健義如第二品阿闍梨德中説以作大成就時當有種種難起要令心不退沒又不驚怖者然後可成也第十四知時非時者謂於種種事業能用悉檀方便既不先時又不後時善趣機會動而有獲如坐禪讀誦營事化人乃至行四威儀飲食睡眠等各有時非時相如真言行者若晝日尸臥通夜不寢之類皆不與時義會也第十五好行惠施者以樂修福事常念利他故能於恩德悲愍二種田中廣植善根以此回向悉地則所祈易果若兼濟義闕徒為宿障所纏則滿願之寶去之彌遠矣第十六心無怖畏者此義與前勇健少有差別如在尊嚴威德衆中能以法自安威儀不異種種難問無怯愞心設令有所未悟亦善咨決所疑終不嬈亂故外典謂之有守之人以具斯德故雖諸聖衆現前時秉持法事心不迷謬也第十七勤修真言行法者謂於祕密乘中所為事業終不中路懈廢更俟後緣則令當得者不得已得者退失多起障道使習與性成故此一緣例如精進波羅蜜能成五度是以毗尼中説以一心精進故得阿耨多羅三藐三菩提何況所餘善法當引智度廣説之第十八通達真言實義者謂如前所説一一名言成立中明識字輪之相達其深意能於衆緣支分淺祕二釋自在旋轉曲赴衆機譬如有智大臣於先陀婆一名之下得其四用悅可王意賞祿倍增故能以法界胎藏作諸成就也第十九常樂坐禪者如前品修習瑜伽種種調心方便是名悉地種子妙果親因要令深心一緣念念無間方能有所觸證自見成功若不能爾徒欲順𪾼目之求於空中種樹雖千萬億劫尚無得義何況此身能致大成就耶第二十樂作成就者此是菩薩大貪以此貪欲因緣染著種種法界不思議色猶如世人以染著六塵不能自捨故成種種業受之身故瑜伽宗受灌頂時阿闍梨立要誓言汝從今已後慎勿斷貪欲以不斷貪欲故則不斷世間佛種也譬如巧説王膳樂學仙方具曉烹任之宜兼傳飛練之決而不設方便無心服食誰能強之乎若具此二十德者乃名作成就人支分也世尊欲慰喻作成就人令深信樂不思議法性故復告金剛手言祕密主譬如欲界有自在悅滿意明呪乃至一切欲處天子於此迷醉者謂他化自在天王自以神通福智之力成此明呪能一時普應六天四域衆生各各如其像類悉令悅滿心願又為欲界一切天子女化作有情無情種種五塵境界皆悉端嚴微妙移奪人心令彼深生味著為之迷醉如現香華伎樂飲食衣服等皆可現前受用若化女色等亦與彼更相娛樂有類生靈故云受用遍受用非但應他而已亦復自受用之彼具貪欲愚癡神變尚爾何況大聖真言而不能普現色身行如來事耶復次如摩醯首羅天王更有明呪名勝意生能一時普現三千大千世界作一切衆生利益乃至化作種種淨妙資具悅可淨居諸聖天尊令其受用遍受用而亦自受用之彼為大千世界主猶固神力若是何況遍一切處法界之主而不能普現色身行如來事也且置是事如世間造幻術者尚能以其呪力加持藥草示現種種園林人物又如阿修羅王猶是四惡趣攝能以自真言力化為天帝釋身坐於善法堂上令三十三天衆皆生疑惑何況如來窮盡諸法幻際而不能以法性身作自在神變化耶又置是事如七母鬼等亦以少分自在力結作明呪能作衆生疾疫災癘亦能息之又現見世間持迦樓羅鳥呪等能攝除衆毒變革寒熱禁伏熾火使成清涼何況如來於一切心自在中最為第一而不能發誠諦言滅除種種災患耶所以世尊廣説諸譬喻者為彼作成就人未獲悉地已來當生種種疑網或自以心力推畫如是之事為定有耶為定無耶或由未達不思議緣起故取著真如實際而生是見夫清淨法身無為無相而今作種種相將非虗妄耶是以世尊為令普斷疑網故更復結會諸句顯明中道言善男子當信如是流出句真言威德此真言威德非從真言中出亦不入衆生不於持誦者處而有可得若行者以此四不生句諦觀察時若有若無若亦有無若非有無等種種戲論滅故即見本不生句若見本不生句時則知諸法法相有佛無佛法爾如是住故云善男子真言加持力故法爾而生無所過越佛更自説因緣以三時不越故謂於去來現在一切諸世界中法爾衆生有機則法身有應機應相關則有種種如來事業生如大海潮久來常爾終不過限次復轉相釋云何故如是以不思議緣生理故譬如明月在空器水澄淨又無煙雲諸障隔礙其間法爾影生來不可拒及其一緣互闕則去不可追逮復思量分別徒成戲論故行者作成就時但當自撿身心務使因緣備具至若有無成壞何足致疑耶復次敦勸言是故善男子當通達不思議法性常不斷絶真言道以行者隨順通達不思議法性時則知諸法如幻際不異寂滅際諸法寂滅際不異如幻際已見無二際故則解如來無邊感應若解如來感應則能以金剛儛戲普現色身使世間佛種常無斷絶故云不斷真言道也經云爾時世尊復住三世無礙力依如來加持不思議力依莊嚴清淨藏三昧者自此已下明所持真言支分如上諸菩薩等各住三昧説自心真言今毗盧遮那亦欲宣説自心真言故先入三昧也如世間衆生種種身口意業皆依於心毗盧遮那亦爾一切三世無礙智力一切神變加持不思議力皆依莊嚴清淨藏一切衆生雖本有蓮華胎藏以無礙智力未圓滿故未得畢竟清淨以加持神力未圓滿故未得畢竟莊嚴又一切衆生雖本有三世無礙智力神變加持不思議力但以蓮華胎藏未得莊嚴清淨故照用皆不現前唯有如來具足成就故能住此三昧也復次今説三昧當知與智慧俱然以蓮華胎藏清淨莊嚴智慧即是如來常慧無有入住出相亦無可表故説如來住於莊嚴清淨藏三昧而實如來定慧無有二相為順常途教門分別令人易解故言佛住於三昧也梵音三摩引鉢底正是三昧入證之時即從定中為説佛心真言故出無盡界無量語表若對毗曇明義即是諸佛常聲語表之業又以十方諸佛共所印成此印即是表標義也次云依法界力無等力正等覺信解力以一音聲四處流出者又轉釋如是音聲非無因緣要具三力然後生起一者不思議法界力二謂無等三昧耶力法爾應度機生則加持應生大誓海潮終不過限此是無等三昧耶力故名無等力若在行人則名諸佛加持力謂正等覺信解力是如來本行菩薩道時所集善根若在行人則名自功德力如持誦人以三事和合正回向故所願皆得成就是故如來亦以三力和合故而出音聲以從衆緣起故當知此聲本不生也言一音四處者如一阿字或加下畫或安上點或置傍點則成四用又阿聲是一或短聲呼或長聲呼或含聲呼或呵聲呼則成四名復次佛心是一或約本不生理或約本不生行或約本不生菩提或約本不生涅槃則成四義四相雖復不同而體未曾異也如來為表斯義故從圓明心中現四字門於此一體四門以一音聲四處流出譬如無熱池中四河流出展轉無盡滿於大海故云普遍一切法界與虗空等無所不至以此聲字之相表示佛心即彼真言實義也初句歸命一切諸如來次句微溼嚩二合古譯謂之毗首是種種義亦是巧義目佉是門所謂種種巧度門也次云薩嚩他去引是總攝一切法門謂十方三世一切諸佛各以無量無邊巧度門種種因緣譬喻言辭演説諸法今則統而論之原其旨趣不出四字門所謂阿阿引去暗噁也以阿字門故一切衆生本有佛知見性如來以種種因緣為彼淨除眼瞙使開明故法華第一句云開佛知見使得清淨即是淨菩提心也既得淨菩提心當廣示法界藏中種種不思議境界令普見一切善知識遍學一切諸度門故法華第二句云示佛知見即長阿引字大悲萬行義也已具大悲萬行次以娑羅樹王華開敷智成大菩提故法華第三句云悟佛知見即是暗字義也既成佛已即以加持方便普門垂迹導利衆生若衆生了知常住時如來衆迹都盡以無迹故名為入般涅槃故法華第四句云入佛知見即是惡字門也字輪對如來方便智更有第五長聲惡引字門以無別體故此中不説若欲指文辨相即是歸命句中種種如來巧度門以此五字統收一切佛法無有遺餘故名為正等覺心也復次今且約一途修行次第故作淺深差別説而實五字各是一切如來智各各統收一切佛法是故下文修觀時隨舉一心即見一切如來心以旋轉無礙故名為正等覺心也世尊為顯如是義故演説此真言時一一聲字悉皆普遍法界於此四字各出一切字門如是一一字門展轉復生一切字門從字發聲當知亦爾此聲從字生故以字為門故云即時一切法界諸聲門從正等覺標幟之音而互出聲也雖互出言音展轉差別然核其本體不出阿聲是故諸菩薩等聞此標幟之音即時隨義知如來心展轉出生一切法門亦知一切法門畢竟不出如來心是故得未曾有開敷淨眼發微妙言音而説偈言奇哉真言行能具廣大智此廣大梵音名毗富攞以真言聲普遍一切法界與虗空等無所不至當知佛心亦然故云廣大智若此智展轉流布猶如標幟之音互出聲時即是成正覺句故曰若遍布此者成佛兩足尊次一偈以見如是利故普令勸勉修行若淨心離我縛時當得如是自在用也經云爾時薄伽梵復説此法句於正等覺心而作成就者已下明先持誦供養支分初偈先明持誦處所於供養法中廣説觀菩提心即是次下品中以無垢眼觀自心處八葉蓮華阿字門使圓鏡現前光明清淨然後依隨經教修種種瑜伽當知此心遍布流出行者初習觀時當有種種相貌但應修常而住勿作異緣久久施功不已自然明白一切疑網漸次消除故云乃至初安住不生疑慮意也此中修習瑜伽略説有二種地一者非三摩引呬多地二者三摩呬多地其等引名相當約瑜伽師地論廣分別之今經所明但以祕密觀為異耳所謂非三摩呬多地者如行者初見心蓮華內阿字時其心任運安住從此字門光明四照以是心鏡淨光明故隨行者所觀之境皆現其中次當依所圖畫三昧耶祕密之身善取本尊威儀色像而諦觀之初時閉目住緣方得明了其後開目普皆顯現分明若欲受持正等覺心真言者當於前説四字中隨取一字置在本尊心圓明上而受持之故云隨取彼一心以心置於心梵本此二心字皆是紇哩乃野心非唧多心也行者初學觀時若心未得調柔者當用前品中方便觀此心字作淨乳流注及與聲輪又轉聲字作本尊像皆如上説以此三密加持淨除無始已來三業重障乃至轉寂轉深命風靜息爾時心不外緣恬安淡怕明鏡不動大海無波自證極清淨句離諸垢𪾼雖瑜伽境界炳著現前如彼高堂懸鑒無所分別以此如鏡之心觀此圓明本尊心上復有圓明種子倍復明淨又甚微小故云不分別如鏡現前甚微細也所以然者為表心種子故如以阿字門觀一切法展轉皆從衆緣生是故核其本際畢竟無依無相以了本際常故如是知世間萬法畢竟不出阿字門今觀圓明種子亦復如是以見初起時極微細故則知但從心生畢竟無住無本以知無住無本故後雖修習增廣乃至彌綸法界則知不異初起時是故學此觀者要從微小漸至光大復次所以從小至大攝大歸小者欲令行者心自在故由彼心力卷舒無礙漸能以一微塵包含無量法界以無量法界內一微塵中若深祕釋者此是般若經中諸佛微細慧以出過一切心量不可示人然亦自在心加持無所不見是故義云微細非細小之謂也復次行者以常修習相應故不思議法界幖幟轉更現前能觀自身即是本尊身觀本尊身即是自身如是不二而二二而不二若觀本尊心佛為自身時即見自身在本尊心圓明中於自心上亦有微細圓明種子能令漸次增廣卷舒自在若觀自心中佛為本尊時即見如來在行者心圓明中於佛心上亦有微細圓明種子能令漸次增廣卷舒自在皆無障礙互不相妨故云乃至本所尊自身像皆現也劑此已前名為影像成就猶屬未等引地次從第二正等覺以下方入等引地能於觀行心中見佛真實加持身故法華明深信解相則為見佛常在耆闍崛山普賢觀云十方諸佛色身不滅我濁惡眼障故不見今此經宗以行者淨心為因如來淨心為緣從於心因緣生故名自見心佛如是見時不離本不生句故名真實加持身不同散心人等心外見佛又不同初學觀人但得影像成就也偈云於鏡漫荼羅者謂如先觀自身作本尊三昧耶身竟又觀心處圓明清淨微妙喻如圓鏡鏡中有八葉大蓮華王鮮白嚴好鬢蕊具足如前於華臺上有種子字轉此種子色聲義趣即見大日如來真實加持身如在甚深窟中住於三昧首戴髮冠通身普放無量光明相好莊嚴不可窮盡爾時行者以蒙法光所照心轉開明自然悟解十緣生句了知如是妙色不異於空雖復本性常空不異於色色相既爾心義亦然以色心皆入阿字門故則知心性本寂猶如虗空離一切執諍戲論過諸魔事是名無相成就初種子心亦名祕密觀門三摩引呬多地對法華經即六根清淨位人約涅槃經即是池珠影現時也從此以後漸運巧方便安徐入水是觀色像身時轉解法門身當知正覺句者即對此經初品明菩提心相正等覺顯現之義以明珠在掌故名為顯現非但遙觀見之也鏡漫荼羅是淨菩提心諸法不能動義大蓮華王座是妙法胎藏不染污常住義深邃而住即是深入無際義總持髮髻冠即是萬德圓滿義若就淺略明義但云持髻冠此持字即具陀羅尼聲謂上窮萬德之頂畢竟同歸譬如攬結衆髻戴之在首故譯者欲兼淺祕二釋故具云總持也次云圍繞無量光即是初品偈中無量智成就義故涅槃經云夫光明者名為智慧如琉璃光菩薩事中廣説次云離妄執分別是初品偈中越百六十心義本寂如虗空是初品偈中本來寂無相義以上文菩提心印撿之節節相對故知此中第二深祕釋正以淨菩提心為悉地種子也若用此品第二正覺句望前品所明第二諸佛勝句也已是一重深祕更約覺觀分證言之又是一重深祕入一一地各有初種子心及三月持誦義轉復深祕隨行者心量淺深皆可作諸成就故此不空悉地其義無邊也次云攝意者從一至一十亦是一若至一百一千一萬等亦皆是一一以遍多時故乃至多時能自見也梵云三摩引呬多是等引義亦是攝心一境之義即一心義也次第二月者塗香等奉作饒益衆生諸種種類如前世間行中亦有塗香等供養此中復説者意與前殊異也此中已得等引其心清淨調柔隨事能成隨奉一香即能如實遍滿法界普遍一切衆生界作種種利益隨事皆成如華嚴經回向中廣説其相如香華者隨有一切所作亦復如是無不成就大作佛事也又他月者此中有兩月行即到初地也更問捨離利養者以文解之即是捨於八法違順之事為妨道故若作祕意是此菩薩大種善根此報無盡現得無量法門功德之寶不應於中而生取著若生法愛則不速入正位故須捨此利養也彼時行者復更如理思惟即菩提心而發悲願稱理而起故言如理思惟也此中思惟意者謂如是應理思惟而得自在謂行者住瑜伽得成就也謂我當自在安樂一切衆生得一切無障即是發決定悲願云何衆生同有如是覺性而不自了受大苦惱耶即生大勇猛心要當以無數方便而成就之必定皆令到一切智地除彼一切垢障使無有餘也或復發願願以如來稱讚悉地樂欲當成者謂如來無量知見究竟成就巧度妙權若不得此云何能以一大事因緣而出于世如是諸佛所稱歎微妙方便我當速成也樂欲即是志願也或時一切衆生諸願滿足無障蓋應理而生攀緣者如是瑜伽無有障礙以如是攀緣而念誦也謂以我功德拔一切苦等以大悲心滿一切衆生之所希願拔除彼大苦而與現樂亦能成就何以故以行者自心無垢障故即有大勢力能又為衆生隨分除障由彼我無障因緣即能隨事成就也此即普賢行願也此相云何謂生如是大悲之願傍生界中互相啖食之苦皆令永除餓鬼趣中乏少飲食常令充滿地獄趣中無量極苦皆令除滅以我功德故者以我所生無量勝福他月捨利養謂第三月於內外無所貪著名捨利養然外事論不求不受施也捨此利養而施衆生由真言行故皆得成就也及此餘門思惟頻頻悲發者此等悲願有無量種不可具言初一月二月持誦亦復如是發願但初二月但以信解心作然未好成第三月所願皆成故回向自他也行者若得意時隨事而作如是頻以大悲之水而洗其心漸令此菩提心有大勢力迄至第十一地以來漸漸力用增皆由此也初一月菩提心次月觀佛形像名正覺句第三住真言離一切相名三月亦名三落叉也次又廣大加持三種句想念謂如來加持神力由三句得成今欲行如來事故思想念此三句也一者以我功德力故二者周遍法界故三者如來神力故此三句和合而廣大加持力生如是念已應誦念此句此是一切真言心也取三句功德隨取華等以心念加之如華即以華真言如香即以香真言加之乃至一切處拔苦與樂獻佛等皆成也若不用本真言加之用後明妃亦成以我功德力於此衆生界周遍如來加持力等法界及諸義利思念欲饒益一切諸衆生彼一切如理當得緣念由住理故隨所緣念而成也乃至除苦苦即除等以我功德力故以如來加持力故以法界平等力故以此三緣合故則能成就不思議業也如此作者當知應理故言當得如理也
