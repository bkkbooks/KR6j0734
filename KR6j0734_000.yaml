body:
  text: 毗盧遮那成佛神變加持經義釋序釋溫古持明藏宗分條流傳譯久矣世之學者多存有相罕契中道其瑜伽行法隱而未明夫法流不通弘道者之憂也此毗盧遮那經乃祕藏圓宗深入實相為衆教之源爾厥有中天竺三藏字輸婆迦羅僧訶唐號善無畏業該八藏名冠五天傳受此經實為宗匠頃有詔迎之常為扈從禪師一行命世之生也明鑒縱達智周變通今上屈之久宴中掖具如國史所載聞三藏蘊法寶之囊思起豫之請承詔與三藏譯出此經仍為筆受譯語比丘寶月練諸教相善解方言非禪師不能扣其幽關非三藏莫能𫾻其至賾此中具明三乘學處及最上乘持明行法欲令學者知世間相性自無生故因寄有為廣示無相一一推核盡法界緣起耳當知無量事迹所有文言結會指歸無非祕密之藏者也分為三十一品尚慮持誦者守文失意禪師又請三藏解釋其義隨而録之無言不窮無法不盡舉淺祕兩釋會衆經微言支分有疑重經搜決事法圖位具列其後次文刪補目為義釋勒成十四卷以梵文有一二重缺纖芥紆回開元十五年禪師沒化都釋門威儀智儼法師與禪師同受業於無畏又間梵語禪師且死之日屬仗法師求諸梵本再請三藏詳之法師閟其文墨訪本未獲之頃而三藏棄世咨詢無所痛哉禪師臨終歎此經幽宗未及宣衍有所遺恨良時難會信矣夫經中文有隱伏前後相明事理互陳是佛方便若不師授未尋義釋而能遊入其門者未之有矣溫古嘗接諸賢末肆預聞此經至於絶待妙行非敢窺測不揆愚昧注心歸仰輒疏拙之思敘其本末焉重刻毗盧遮那成佛神變加持經義釋凡例現行本文字差脫頗多不便看讀今據古藏本挍讐訂正但其原本有疑誤者書疑誤恐剩若其形誤無疑者輒改正焉標書一本者即異本也其書三本則有七卷若十卷若十四卷者併備校閲也書山本則傳教大師勘定本是也智證大師將來十卷者則直書智證本疏則弘法大師將來二十卷者也真言并梵名等副梵字者諸本並隔字書之恐後人所加非疏者意而今悉準原本或傍書對注或隔字書之經疏爛脫原出于聖意蓋為防慢法者今不敢改一字然先哲口授所傳非一原本附之今並除去讀者宜稟師家提命也慈勇欽識毗盧遮那成佛神變加持經義釋目次卷第一序凡例入真言門住心品第一卷第二入真言門住心品之餘卷第三入漫荼羅具緣真言品第二卷第四入漫荼羅具緣真言品之二卷第五入漫荼羅具緣真言品之三卷第六入漫荼羅具緣真言品之四卷第七息障品第三普通真言藏品第四卷第八世間成就品第五悉地出現品第六卷第九悉地出現品之餘成就悉地品第七轉字輪漫荼羅行品第八卷第十轉字轉漫荼羅行品之餘密印品第九卷第十一字輪品第十祕密漫荼羅品第十一卷第十二祕密漫荼羅品之餘入祕密漫荼羅法品第十二住祕密漫荼羅位品第十三祕密八印品第十四持明禁戒品第十五阿闍梨真實智品第十六布字品第十七卷第十三受方便學處品第十八説百字生品第十九百字果相應品第二十百字位成品第二十一百字成就持誦品第二十二卷第十四百字真言法品第二十三説菩提性品第二十四三三昧耶品第二十五説如來品第二十六世出世護摩法品第二十七説本尊三昧品第二十八説無相三昧品第二十九世出世持誦品第三十囑纍品第三十一緣起跋毗盧遮那成佛神變加持經義釋目次終
